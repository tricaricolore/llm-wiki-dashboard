<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Wiki</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--accent-dim:#1f6feb22;--green:#3fb950;--orange:#d29922;--red:#f85149;--purple:#bc8cff;--cyan:#39d2c0;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;--mono:'SF Mono','Fira Code',Menlo,monospace}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden}button,input,select,textarea{font-family:var(--font)}

.app{display:grid;grid-template-columns:280px 1fr;grid-template-rows:48px 1fr;height:100vh}

/* Header */
header{grid-column:1/-1;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px}
header h1{font-size:15px;font-weight:600;white-space:nowrap}header h1 span{color:var(--accent)}
.hstats{display:flex;gap:16px;margin-left:auto;font-size:12px;color:var(--muted)}.hstats b{color:var(--text);font-weight:600}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;animation:blink 2s infinite;margin-right:4px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Sidebar */
.side{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.side input[type=text]{margin:10px 10px 0;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none}.side input:focus{border-color:var(--accent)}
.tabs{display:flex;margin:8px 10px 0}.tabs button{flex:1;padding:6px 0;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.4px}.tabs button.on{color:var(--accent);border-bottom-color:var(--accent)}
.slist{flex:1;overflow-y:auto;padding:6px 0}
.grp-label{padding:4px 14px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:6px}
.item{padding:6px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;border-left:3px solid transparent}.item:hover{background:var(--bg3)}.item.on{background:var(--accent-dim);border-left-color:var(--accent)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.d-source{background:var(--green)}.d-entity{background:var(--accent)}.d-concept{background:var(--purple)}.d-comparison{background:var(--orange)}.d-analysis{background:var(--cyan)}.d-overview{background:var(--muted)}.d-missing,.d-unknown{background:transparent;border:1.5px dashed var(--red)}
.item .t{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.item .m{font-size:11px;color:var(--muted)}
.folder-item{padding:6px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}.folder-item:hover{background:var(--bg3);color:var(--text)}.folder-item .arrow{font-size:10px;transition:transform .15s;width:12px;text-align:center}.folder-item .arrow.open{transform:rotate(90deg)}.folder-children{padding-left:12px}
.log-item{padding:6px 14px;font-size:12px}.log-item .date{color:var(--muted);font-family:var(--mono);font-size:10px}
.badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;text-transform:uppercase;margin:0 4px}
.b-ingest{background:#3fb95022;color:var(--green)}.b-query{background:#58a6ff22;color:var(--accent)}.b-lint{background:#d2992222;color:var(--orange)}.b-maintenance{background:#8b949e22;color:var(--muted)}

/* Status bar */
.status-bar{border-top:1px solid var(--border);padding:10px 14px;display:flex;flex-direction:column;gap:6px;font-size:11px}
.status-row{display:flex;align-items:center;gap:6px}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}.status-dot.err{background:var(--red);box-shadow:0 0 6px var(--red)}.status-dot.loading{background:var(--orange);animation:blink 1s infinite}
.status-label{color:var(--muted)}.status-label b{color:var(--text);font-weight:500}

/* Main */
main{display:flex;flex-direction:column;overflow:hidden}
.toolbar{display:flex;align-items:center;padding:8px 16px;border-bottom:1px solid var(--border);gap:6px;flex-wrap:wrap}
.toolbar button,.toolbar select{padding:4px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:12px;cursor:pointer}
.toolbar button:hover{color:var(--text);border-color:var(--muted)}.toolbar button.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.toolbar .sep{width:1px;height:20px;background:var(--border)}
.toolbar .bc{margin-left:4px;font-size:12px;color:var(--muted)}.toolbar .bc b{color:var(--text)}
.content{flex:1;overflow-y:auto;position:relative}

/* Page */
.page{max-width:800px;margin:0 auto;padding:28px 36px}
.page .pmeta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.tag{padding:2px 7px;background:var(--bg3);border-radius:10px;font-size:10px;color:var(--muted)}
.tbadge{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase}
.page-actions{margin-left:auto;display:flex;gap:6px}
.page-actions button{padding:3px 8px;font-size:11px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer}
.page-actions button:hover{color:var(--text)}.page-actions button.danger:hover{color:var(--red);border-color:var(--red)}

/* Markdown */
.md{line-height:1.7;font-size:15px}
.md h1{font-size:26px;margin:0 0 14px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.md h2{font-size:20px;margin:28px 0 10px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.md h3{font-size:17px;margin:20px 0 8px}.md p{margin:0 0 14px}
.md a{color:var(--accent);text-decoration:none}.md a:hover{text-decoration:underline}
.md code{background:var(--bg3);padding:2px 5px;border-radius:3px;font-family:var(--mono);font-size:.88em}
.md pre{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:14px;overflow-x:auto;margin:0 0 14px}.md pre code{background:none;padding:0}
.md ul,.md ol{margin:0 0 14px;padding-left:22px}.md li{margin:3px 0}
.md blockquote{border-left:3px solid var(--accent);padding-left:14px;color:var(--muted);margin:0 0 14px}
.md table{border-collapse:collapse;width:100%;margin:0 0 14px}.md th,.md td{border:1px solid var(--border);padding:6px 10px;text-align:left}.md th{background:var(--bg3);font-weight:600}
.md strong{color:var(--text)}.md hr{border:none;border-top:1px solid var(--border);margin:20px 0}
/* Callout */
.callout{border-left:3px solid var(--accent);background:var(--bg2);padding:10px 14px;border-radius:0 6px 6px 0;margin:0 0 14px}
.callout.callout-warning{border-left-color:var(--orange)}.callout.callout-danger{border-left-color:var(--red)}.callout.callout-tip{border-left-color:var(--green)}.callout.callout-info{border-left-color:var(--accent)}
.callout-title{font-weight:600;font-size:13px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}

/* Panels (ingest, query, lint) */
.panel{max-width:720px;margin:0 auto;padding:28px 36px}
.panel h2{font-size:18px;margin-bottom:16px}
.panel p.desc{color:var(--muted);font-size:13px;margin-bottom:16px}
.field{margin-bottom:14px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field textarea{min-height:200px;font-family:var(--mono);font-size:13px;line-height:1.5;resize:vertical}
.btn{padding:8px 20px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{opacity:.9}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{opacity:.9}
.btn-orange{background:var(--orange);color:#fff}.btn-orange:hover{opacity:.9}
.btn-outline{background:none;border:1px solid var(--border);color:var(--muted)}.btn-outline:hover{color:var(--text);border-color:var(--muted)}
.result-box{margin-top:14px;padding:12px;border-radius:6px;font-size:13px;line-height:1.6;white-space:pre-wrap;font-family:var(--mono);max-height:400px;overflow-y:auto}
.result-box.ok{background:#3fb95010;border:1px solid #3fb95033;color:var(--green)}
.result-box.err{background:#f8514910;border:1px solid #f8514933;color:var(--red)}
.result-box.info{background:var(--bg2);border:1px solid var(--border);color:var(--text)}
.result-box .md{font-family:var(--font);white-space:normal}

/* Edit mode */
.edit-area{width:100%;min-height:400px;font-family:var(--mono);font-size:13px;line-height:1.5;resize:vertical;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:14px;outline:none}
.edit-area:focus{border-color:var(--accent)}
.edit-actions{display:flex;gap:8px;margin-top:10px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:#00000088;display:flex;align-items:center;justify-content:center;z-index:100;display:none}.modal-bg.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:24px;width:420px;max-width:90vw}
.modal h3{font-size:16px;margin-bottom:16px}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.modal .actions button{padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text)}
.modal .actions button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.modal .actions button.danger{background:var(--red);border-color:var(--red);color:#fff}

/* Reflect */
.reflect-section{margin-bottom:20px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.reflect-hdr{padding:10px 14px;background:var(--bg2);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;cursor:pointer}
.reflect-hdr:hover{background:var(--bg3)}
.reflect-hdr .r-arrow{font-size:10px;transition:transform .15s;width:12px}.reflect-hdr .r-arrow.open{transform:rotate(90deg)}
.reflect-body{padding:14px;display:none;font-size:13px;line-height:1.6}
.reflect-body.show{display:block}
.reflect-item{display:flex;align-items:center;gap:8px;padding:4px 0}
.reflect-item .ri-name{flex:1}
.reflect-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;margin-left:8px}
.rb-overdue{background:#f8514922;color:var(--red)}

/* Index strategy banner */
.idx-banner{padding:6px 16px;font-size:12px;border-bottom:1px solid var(--border);display:none;align-items:center;gap:8px}
.idx-banner.show{display:flex}
.idx-banner.warn{background:#d2992215;color:var(--orange)}
.idx-banner.danger{background:#f8514915;color:var(--red)}
.idx-banner .idx-close{margin-left:auto;background:none;border:none;color:inherit;cursor:pointer;font-size:14px}
.idx-badge{font-size:11px;padding:1px 6px;border-radius:4px;font-weight:600;font-family:var(--mono)}
.idx-flat{background:#3fb95022;color:var(--green)}.idx-hierarchical{background:#58a6ff22;color:var(--accent)}.idx-indexed{background:#f8514922;color:var(--red)}

/* Wiki ratio gauge */
.wr-gauge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);position:relative;cursor:default}
.wr-bar{width:48px;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.wr-fill{height:100%;border-radius:3px;transition:width .3s}
.wr-val{font-weight:600;font-variant-numeric:tabular-nums;min-width:32px}
.wr-tip{display:none;position:absolute;top:120%;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:11px;white-space:nowrap;z-index:50;color:var(--text)}
.wr-gauge:hover .wr-tip{display:block}

/* Query files read */
.qf-summary{font-size:13px;color:var(--muted);margin:10px 0 6px;display:flex;align-items:center;gap:8px}
.qf-summary b{color:var(--text)}
.qf-toggle{font-size:11px;color:var(--accent);cursor:pointer;border:none;background:none;font-family:var(--font)}
.qf-toggle:hover{text-decoration:underline}
.qf-list{font-size:12px;font-family:var(--mono);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;margin-bottom:10px;max-height:200px;overflow-y:auto;display:none}
.qf-list.show{display:block}
.qf-list .qf-wiki{color:var(--accent)}.qf-list .qf-raw{color:var(--orange)}.qf-list .qf-other{color:var(--muted)}

/* Citation badges */
.cite-badge{display:inline-block;font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-dim);padding:0 5px;border-radius:8px;cursor:pointer;vertical-align:super;line-height:1.4;margin:0 1px;position:relative}
.cite-badge:hover{background:var(--accent);color:#fff}
.cite-tip{display:none;position:absolute;bottom:120%;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;font-weight:400;white-space:nowrap;color:var(--text);z-index:50;pointer-events:none}
.cite-badge:hover .cite-tip{display:block}

/* Provenance table */
.prov-table{width:100%;border-collapse:collapse;font-size:13px}
.prov-table th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
.prov-table td{padding:8px 10px;border-bottom:1px solid var(--border)}
.prov-table tr:hover td{background:var(--bg3)}
.prov-page{color:var(--accent);cursor:pointer}.prov-page:hover{text-decoration:underline}
.prov-bar{display:inline-block;height:6px;border-radius:3px;min-width:4px}
.prov-cov{font-variant-numeric:tabular-nums;font-weight:600}
.prov-low{color:var(--red)}.prov-mid{color:var(--orange)}.prov-high{color:var(--green)}

/* Ingest result panel */
.ir-panel{max-width:960px;margin:0 auto;padding:24px 32px}
.ir-split{display:grid;grid-template-columns:240px 1fr;gap:16px;min-height:350px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.ir-files{background:var(--bg2);padding:12px 0;overflow-y:auto;border-right:1px solid var(--border)}
.ir-file{padding:6px 14px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;border-left:3px solid transparent}
.ir-file:hover{background:var(--bg3)}.ir-file.on{background:var(--accent-dim);border-left-color:var(--accent)}
.ir-file .ir-icon{font-size:11px;font-weight:700;width:16px;text-align:center;flex-shrink:0}
.ir-file .ir-icon.created{color:var(--green)}.ir-file .ir-icon.modified{color:var(--orange)}
.ir-file .ir-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ir-detail{padding:16px;overflow:auto;background:var(--bg)}
.ir-diff{font-family:var(--mono);font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-all}
.ir-diff .d-add{color:var(--green)}.ir-diff .d-del{color:var(--red)}.ir-diff .d-hdr{color:var(--accent);font-weight:600}
.ir-preview{font-size:13px;line-height:1.6}
.ir-reasoning{margin-top:16px;padding:12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;font-size:13px;line-height:1.6;color:var(--muted)}
.ir-reasoning strong{color:var(--text)}
.ir-actions{margin-top:16px;display:flex;gap:10px}

/* History table */
.hist-table{width:100%;border-collapse:collapse;font-size:13px}
.hist-table th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
.hist-table td{padding:8px 10px;border-bottom:1px solid var(--border)}
.hist-table tr:hover td{background:var(--bg3)}
.hist-hash{font-family:var(--mono);font-size:12px;color:var(--accent)}
.hist-source{font-weight:500}
.hist-date{color:var(--muted);font-size:12px}
.hist-files{color:var(--muted);font-size:12px;text-align:center}
.btn-revert{padding:3px 10px;font-size:11px;background:none;border:1px solid var(--red);border-radius:4px;color:var(--red);cursor:pointer}
.btn-revert:hover{background:var(--red);color:#fff}
.btn-revert:disabled{opacity:.3;cursor:not-allowed}

/* Graph */
.graph-wrap{width:100%;height:100%;position:absolute;top:0;left:0}.graph-wrap canvas{width:100%;height:100%}

::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1><span>&#9670;</span> LLM Wiki</h1>
    <div class="hstats" id="hstats"></div>
  </header>
  <aside class="side">
    <input type="text" id="q" placeholder="Search pages...">
    <div class="tabs">
      <button class="on" data-t="tree">Tree</button>
      <button data-t="pages">Pages</button>
      <button data-t="log">Log</button>
    </div>
    <div class="slist" id="slist"></div>
    <div class="status-bar" id="statusBar">
      <div class="status-row"><div class="status-dot loading" id="dotClaude"></div><span class="status-label">Claude CLI <b id="lblClaude">checking...</b></span></div>
      <div class="status-row"><div class="status-dot loading" id="dotObsidian"></div><span class="status-label">Obsidian <b id="lblObsidian">checking...</b></span></div>
    </div>
  </aside>
  <main>
    <div class="idx-banner" id="idxBanner"><span id="idxBannerText"></span><button class="idx-close" onclick="this.parentElement.classList.remove('show')">&times;</button></div>
    <div class="toolbar">
      <button class="on" data-v="page">Page</button>
      <button data-v="ingest">+ Ingest</button>
      <button data-v="query">Query</button>
      <button data-v="lint">Lint</button>
      <button data-v="reflect" id="reflectBtn">Reflect</button>
      <button data-v="graph">Graph</button>
      <button data-v="history">History</button>
      <button data-v="provenance">Provenance</button>
      <div class="sep"></div>
      <button onclick="showCreateFolder()">+ Folder</button>
      <button onclick="showCreatePage()">+ Page</button>
      <div class="sep"></div>
      <button data-v="schema" style="border-color:var(--orange);color:var(--orange)">CLAUDE.md</button>
      <button data-v="guide" style="border-color:var(--purple);color:var(--purple)">? Guide</button>
      <span class="bc" id="bc"></span>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- Modals -->
<div class="modal-bg" id="modalFolder"><div class="modal"><h3>New Folder</h3>
  <div class="field"><label>Folder Name</label><input type="text" id="newFolderName" placeholder="research-topic"></div>
  <div class="field"><label>Parent</label><select id="newFolderParent"><option value="">wiki/ (root)</option></select></div>
  <div class="actions"><button onclick="closeModals()">Cancel</button><button class="primary" onclick="doCreateFolder()">Create</button></div>
</div></div>
<div class="modal-bg" id="modalPage"><div class="modal"><h3>New Page</h3>
  <div class="field"><label>Title</label><input type="text" id="newPageTitle" placeholder="Page Title"></div>
  <div class="field"><label>Type</label><select id="newPageType"><option value="concept">Concept</option><option value="entity">Entity</option><option value="source">Source</option><option value="analysis">Analysis</option><option value="comparison">Comparison</option><option value="overview">Overview</option></select></div>
  <div class="field"><label>Folder</label><select id="newPageFolder"><option value="">wiki/ (root)</option></select></div>
  <div class="actions"><button onclick="closeModals()">Cancel</button><button class="primary" onclick="doCreatePage()">Create</button></div>
</div></div>
<div class="modal-bg" id="modalDelete"><div class="modal"><h3>Delete Page</h3>
  <p style="color:var(--muted);font-size:13px;margin-bottom:12px">이 페이지를 삭제합니다. 되돌릴 수 없습니다.</p>
  <p style="font-size:14px"><b id="deletePageName"></b></p>
  <div class="actions"><button onclick="closeModals()">Cancel</button><button class="danger" onclick="confirmDelete()">Delete</button></div>
</div></div>

<script>
const TC={source:'#3fb950',entity:'#58a6ff',concept:'#bc8cff',comparison:'#d29922',analysis:'#39d2c0',overview:'#8b949e',missing:'#f85149',unknown:'#f85149'};
let D=null,folders=null,view='page',cur=null,tab='tree',sq='',lastHash='',editing=false;

// ─── marked callout extension ───
const renderer=new marked.Renderer();
const origBlockquote=renderer.blockquote;
renderer.blockquote=function(body){
  // Handle both string and object inputs
  let text = typeof body === 'string' ? body : (body && body.text ? body.text : String(body));
  const m=text.match(/^\s*<p>\s*\[!(warning|danger|tip|info|note)\]\s*(.*?)<\/p>/i);
  if(m){
    const type=m[1].toLowerCase();const title=m[2]||type;
    const rest=text.replace(m[0],'');
    return `<div class="callout callout-${type}"><div class="callout-title">${title}</div>${rest}</div>`;
  }
  return `<blockquote>${text}</blockquote>`;
};

function showPage(fn){
  cur=fn;setView('page');
  const p=D.pages.find(x=>x.filename===fn);if(!p){document.getElementById('content').innerHTML=`<div style="padding:40px;text-align:center;color:var(--muted)">Page not found: ${esc(fn)}</div>`;return;}
  document.getElementById('bc').innerHTML=`<b>${esc(p.title)}</b> · ${p.type} · ${p.updated||p.created}`;
  let body=p.content.replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g,'[$2]($1.md)').replace(/\[\[([^\]]+)\]\]/g,'[$1]($1.md)');
  // citation [^src-*] → 렌더 후 처리할 마커로 변환
  var citeMap={},citeN=0;
  body=body.replace(/\[\^(src-[a-z0-9-]+)\](?!:)/g,function(m,slug){
    if(!citeMap[slug])citeMap[slug]=++citeN;
    return '%%CITE:'+slug+'%%';
  });
  // citation 정의 줄 제거 (하단 footnote 줄)
  body=body.replace(/^\[\^src-[a-z0-9-]+\]:.*$/gm,'');
  var html=marked.parse(body);
  // 마커 → 배지 HTML
  html=html.replace(/%%CITE:([a-z0-9-]+)%%/g,function(m,slug){
    var n=citeMap[slug]||'?';
    var srcPage='source-'+slug.replace('src-','');
    var srcData=D.pages.find(function(pp){return pp.filename===srcPage+'.md';});
    var tipText=srcData?srcData.title:srcPage;
    return '<span class="cite-badge" onclick="showPage(\''+srcPage+'.md\')">'+n+'<span class="cite-tip">'+esc(tipText)+'</span></span>';
  });
  var c=TC[p.type]||'var(--muted)';
  var tags=p.tags.map(function(t){return '<span class="tag">'+esc(t)+'</span>';}).join('');
  var isSys=['index.md','log.md','overview.md'].indexOf(fn)>=0;
  var actions='<div class="page-actions"><button onclick="editPage(\''+fn+'\')">Edit</button>'+(isSys?'':'<button class="danger" onclick="showDeleteModal(\''+fn+'\',\''+esc(p.title).replace(/'/g,"\\'")+'\')">Delete</button>')+'</div>';
  document.getElementById('content').innerHTML='<div class="page"><div class="pmeta"><span class="tbadge" style="background:'+c+'22;color:'+c+'">'+p.type+'</span>'+tags+actions+'</div><div class="md">'+html+'</div></div>';
  document.querySelectorAll('.md a').forEach(function(a){var h=a.getAttribute('href');if(h&&h.endsWith('.md')&&h.indexOf('://')<0){a.onclick=function(e){e.preventDefault();showPage(h);};a.style.cursor='pointer';}});
  renderSidebar();
}

function selectIrFile(idx){
  var files=window._irFiles;
  if(!files||!files[idx])return;
  // highlight
  var items=document.querySelectorAll('.ir-file');
  items.forEach(function(el,i){el.classList.toggle('on',i===idx);});
  var f=files[idx];
  var detail=document.getElementById('irDetail');
  if(f.type==='created'){
    detail.innerHTML='<div class="ir-preview"><div class="md">'+marked.parse(f.preview||'(empty)')+'</div></div>';
  }else{
    detail.innerHTML='<div class="ir-diff">'+formatDiff(f.diff||'')+'</div>';
  }
}

function formatDiff(raw){
  if(!raw)return '<span style="color:var(--muted)">(no diff)</span>';
  var lines=raw.split('\n');
  var out=[];
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    var el=esc(l);
    if(l.startsWith('@@'))out.push('<span class="d-hdr">'+el+'</span>');
    else if(l.startsWith('+')&&!l.startsWith('+++'))out.push('<span class="d-add">'+el+'</span>');
    else if(l.startsWith('-')&&!l.startsWith('---'))out.push('<span class="d-del">'+el+'</span>');
    else out.push(el);
  }
  return out.join('\n');
}

async function doLint(){
  const btn=document.getElementById('lintBtn'),res=document.getElementById('lintResult'),fx=document.getElementById('lintFix');
  btn.disabled=true;btn.textContent='Scanning...';res.className='result-box info';res.textContent='Claude가 위키를 점검 중...';fx.style.display='none';
  try{const r=await fetch('/api/lint',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});const d=await r.json();
    if(d.ok){
      let report=d.report.replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g,'[$2]($1.md)').replace(/\[\[([^\]]+)\]\]/g,'[$1]($1.md)');
      res.className='result-box ok';res.innerHTML='<div class="md">'+marked.parse(report)+'</div>';
      res.querySelectorAll('.md a').forEach(a=>{const h=a.getAttribute('href');if(h&&h.endsWith('.md')&&!h.includes('://')){a.onclick=e=>{e.preventDefault();showPage(h);};a.style.cursor='pointer';}});

  }catch(e){res.className='result-box err';res.textContent='Network error: '+e.message;}

}
async function doLintFix(){
  const res=document.getElementById('lintFixResult');res.className='result-box info';res.textContent='수정 적용 중...';

}

async function doReflect(){
  var win=document.getElementById('reflectWindow').value;
  var btn=document.getElementById('reflectRunBtn');
  var res=document.getElementById('reflectResult');
  btn.disabled=true;btn.textContent='Analyzing...';
  res.className='result-box info';res.textContent='Claude가 위키를 메타 분석 중... (1~3분 소요)';
  try{
    var r=await fetch('/api/reflect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({window:win})});
    var d=await r.json();
    if(d.ok){
      var h='';
      // Suggested Pages
      h+=buildReflectSection('Suggested Pages','새로 만들면 좋을 페이지',d.sections.suggested_pages,true);
      // Suggested Schema
      h+=buildReflectSection('Suggested Schema Updates','CLAUDE.md에 추가할 규칙',d.sections.suggested_schema,false);
      // Suggested Sources
      h+=buildReflectSection('Suggested Sources','보강이 필요한 주제의 검색어',d.sections.suggested_sources,false);
      // Contradiction Review
      h+=buildReflectSection('Contradiction Review','소스 간 충돌 패턴',d.sections.contradiction_review,false);
      res.className='';
      res.innerHTML=h;
      checkReflectStatus();
    }else{
      res.className='result-box err';res.textContent='Error: '+d.error;
    }
  }catch(e){res.className='result-box err';res.textContent='Network error: '+e.message;}
  btn.disabled=false;btn.textContent='Run Reflect';
}

function buildReflectSection(title,desc,content,showCreate){
  if(!content||content.trim()==='(none)'||content.trim()==='없음')content='발견 사항 없음.';
  var body=content.replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g,'[$2]($1.md)').replace(/\[\[([^\]]+)\]\]/g,'[$1]($1.md)');
  var h='<div class="reflect-section">';
  h+='<div class="reflect-hdr" onclick="toggleReflectSection(this)"><span class="r-arrow">▶</span>'+esc(title)+'<span style="color:var(--muted);font-weight:400;font-size:11px;margin-left:auto">'+esc(desc)+'</span></div>';
  h+='<div class="reflect-body"><div class="md">'+marked.parse(body)+'</div></div>';
  h+='</div>';
  return h;
}

function toggleReflectSection(hdr){
  var arrow=hdr.querySelector('.r-arrow');
  var body=hdr.nextElementSibling;
  if(body.classList.contains('show')){body.classList.remove('show');arrow.classList.remove('open');}
  else{body.classList.add('show');arrow.classList.add('open');}
}

  res.className='result-box info';res.textContent='Claude가 '+page+' citation을 보완 중...';
  try{
    var r=await fetch('/api/provenance/fix',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({page:page})});
    var d=await r.json();
    if(d.ok){

async function doRevert(hash,sourceName){
  if(!confirm('Revert: "'+sourceName+'" ingest를 되돌립니다.\n\n해당 커밋이 생성/수정한 파일들이 이전 상태로 복원됩니다.\n계속하시겠습니까?'))return;
  var btns=document.querySelectorAll('.btn-revert');
  btns.forEach(function(b){b.disabled=true;});
  try{
    var r=await fetch('/api/revert',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({commit_hash:hash})});
    var d=await r.json();
    if(d.ok){
      await Promise.all([loadWiki(),loadFolders()]);
      renderStats();renderSidebar();
      showHistory();
    }else{
      alert('Revert 실패: '+d.error);
      btns.forEach(function(b){b.disabled=false;});
    }
  }catch(e){
    alert('Error: '+e.message);
    btns.forEach(function(b){b.disabled=false;});
  }
}

// ─── Graph ───
function showGraph(){
  setView('graph');cur=null;document.getElementById('bc').innerHTML='Knowledge Graph · 노드 클릭으로 이동';
  const area=document.getElementById('content');area.innerHTML='<div class="graph-wrap"><canvas id="cv"></canvas></div>';
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),box=cv.parentElement;
  const dpr=window.devicePixelRatio||1;cv.width=box.clientWidth*dpr;cv.height=box.clientHeight*dpr;cv.style.width=box.clientWidth+'px';cv.style.height=box.clientHeight+'px';ctx.scale(dpr,dpr);
  const W=box.clientWidth,H=box.clientHeight;
  if(!D||!D.graph.nodes.length){ctx.fillStyle='#8b949e';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('No pages yet',W/2,H/2);return;}
  const ns=D.graph.nodes.map(n=>({...n,x:W/2+(Math.random()-.5)*300,y:H/2+(Math.random()-.5)*300,vx:0,vy:0,r:n.type==='overview'?18:n.type==='missing'?7:13}));
  const nm={};ns.forEach(n=>nm[n.id]=n);
  const es=D.graph.edges.filter(e=>nm[e.from]&&nm[e.to]).map(e=>({s:nm[e.from],t:nm[e.to]}));
  let hov=null,drag=null,moved=false;
  function tick(){const cx=W/2,cy=H/2;for(const n of ns){n.vx+=(cx-n.x)*.001;n.vy+=(cy-n.y)*.001;}
    for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const a=ns[i],b=ns[j];let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1,f=1200/(d*d);a.vx-=dx/d*f;a.vy-=dy/d*f;b.vx+=dx/d*f;b.vy+=dy/d*f;}
    for(const e of es){let dx=e.t.x-e.s.x,dy=e.t.y-e.s.y,d=Math.sqrt(dx*dx+dy*dy)||1,f=(d-140)*.004;e.s.vx+=dx/d*f;e.s.vy+=dy/d*f;e.t.vx-=dx/d*f;e.t.vy-=dy/d*f;}
    for(const n of ns){if(n===drag)continue;n.vx*=.82;n.vy*=.82;n.x+=n.vx;n.y+=n.vy;n.x=Math.max(n.r+10,Math.min(W-n.r-10,n.x));n.y=Math.max(n.r+10,Math.min(H-n.r-10,n.y));}
    ctx.clearRect(0,0,W,H);
    for(const e of es){const hi=hov&&(e.s.id===hov.id||e.t.id===hov.id);ctx.strokeStyle=hi?'#58a6ff66':'#30363d';ctx.lineWidth=hi?2:1;ctx.beginPath();ctx.moveTo(e.s.x,e.s.y);ctx.lineTo(e.t.x,e.t.y);ctx.stroke();}
    for(const n of ns){const c=TC[n.type]||'#8b949e',hi=hov&&hov.id===n.id,act=cur===n.id;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      if(n.type==='missing'){ctx.fillStyle='#0d1117';ctx.fill();ctx.strokeStyle=c;ctx.lineWidth=2;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);}
      else{ctx.fillStyle=hi||act?c:c+'77';ctx.fill();if(act){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();}}
      ctx.fillStyle=hi?'#e6edf3':'#8b949e';ctx.font=`${hi?13:11}px -apple-system,sans-serif`;ctx.textAlign='center';ctx.fillText(n.label,n.x,n.y+n.r+14);}
    requestAnimationFrame(tick);}
  function hit(mx,my){for(const n of ns){const dx=mx-n.x,dy=my-n.y;if(dx*dx+dy*dy<(n.r+5)**2)return n;}return null;}
  cv.onmousemove=e=>{const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;if(drag){drag.x=mx;drag.y=my;drag.vx=0;drag.vy=0;moved=true;return;}hov=hit(mx,my);cv.style.cursor=hov?'pointer':'default';};
  cv.onmousedown=e=>{const r=cv.getBoundingClientRect();drag=hit(e.clientX-r.left,e.clientY-r.top);moved=false;};cv.onmouseup=()=>{drag=null;};
  cv.onclick=e=>{if(moved)return;const r=cv.getBoundingClientRect(),n=hit(e.clientX-r.left,e.clientY-r.top);if(n&&D.pages.find(p=>p.filename===n.id))showPage(n.id);};
  tick();
}

    '| **concept** | 🟣 | 아이디어, 기술, 프레임워크 |',
    '| **comparison** | 🟡 | 비교 분석 |',
    '| **analysis** | 🩵 | 심층 분석 (Query 결과 저장 등) |',
    '| **overview** | ⚪ | 위키/카테고리 개요 |','','---','',
    '## 자동 갱신','',
    '대시보드는 5초마다 위키 변경을 감지하여 자동 갱신합니다.','CLI나 Obsidian에서 직접 수정해도 대시보드에 반영됩니다.','','---','',
    '## Obsidian 연동','',
    '이 프로젝트 폴더가 Obsidian vault로 등록되어 있습니다.',
    '- **Graph View** (Cmd+G) — 위키 연결 구조',
    '- **Backlinks** — 현재 페이지를 참조하는 모든 페이지',
    '- **Cmd+Shift+D** — 클리핑 기사 이미지 로컬 다운로드','','---','',
    '## 서버','',
    'python dashboard/server.py → http://localhost:8090','',
    '| API | 기능 |','|-----|------|',
    '| GET /api/status | Claude CLI, Obsidian 연결 상태 |',
    '| GET /api/wiki | 위키 데이터 (페이지, 그래프, 로그) |',
    '| GET /api/hash | 위키 변경 감지용 해시 |',
    '| POST /api/ingest | Ingest 실행 |',
    '| POST /api/query | Query 실행 |',
    '| POST /api/query/save | Query 답변을 위키에 저장 |',
    '| POST /api/lint | Lint 실행 |',
    '| POST /api/lint/fix | Lint 자동 수정 |',
    '| POST /api/page/update | 페이지 편집 |',
    '| POST /api/page/delete | 페이지 삭제 |',
  ];
  var md=lines.join('\n');
  document.getElementById('content').innerHTML='<div class="page"><div class="md">'+marked.parse(md)+'</div></div>';
}

// ─── Folder/Page create ───
function showCreateFolder(){updateFolderSelects();document.getElementById('modalFolder').classList.add('show');document.getElementById('newFolderName').focus();}
function showCreatePage(){updateFolderSelects();document.getElementById('modalPage').classList.add('show');document.getElementById('newPageTitle').focus();}
function closeModals(){document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('show'));}
function updateFolderSelects(){
  const opts='<option value="">wiki/ (root)</option>'+(folders?folders.children.map(c=>`<option value="${c.name}">${c.name}/</option>`).join(''):'');
  ['newFolderParent','newPageFolder'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=opts;});
}
async function doCreateFolder(){const n=document.getElementById('newFolderName').value.trim(),p=document.getElementById('newFolderParent').value;if(!n){alert('Folder name required');return;}
  await fetch('/api/folder',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,parent:p})});await loadFolders();renderSidebar();closeModals();document.getElementById('newFolderName').value='';}
async function doCreatePage(){const t=document.getElementById('newPageTitle').value.trim(),tp=document.getElementById('newPageType').value,f=document.getElementById('newPageFolder').value;if(!t){alert('Title required');return;}
  const r=await fetch('/api/page',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:t,type:tp,folder:f})});const d=await r.json();
  await Promise.all([loadWiki(),loadFolders()]);renderStats();renderSidebar();closeModals();document.getElementById('newPageTitle').value='';if(d.filename)showPage(d.filename);}

// ─── Events ───
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{tab=b.dataset.t;document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('on',x===b));renderSidebar();});
document.querySelectorAll('.toolbar button[data-v]').forEach(b=>b.onclick=()=>{
  const v=b.dataset.v;if(v==='graph')showGraph();else if(v==='ingest')showIngest();else if(v==='query')showQuery();else if(v==='lint')showLint();else if(v==='reflect')showReflect();else if(v==='history')showHistory();else if(v==='provenance')showProvenance();else if(v==='schema')showSchema();else if(v==='guide')showGuide();else if(cur)showPage(cur);});
document.getElementById('q').oninput=e=>{sq=e.target.value;if(tab!=='pages'){tab='pages';document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('on',x.dataset.t==='pages'));}renderSidebar();};
document.querySelectorAll('.modal-bg').forEach(m=>m.onclick=e=>{if(e.target===m)closeModals();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModals();});
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
init();
</script>
