<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karpathy LLM dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root{
  /* ── Black & White 팔레트 ── */
  --bg:#0a0a0a;           /* 가장 어두운 배경 */
  --bg2:#141414;          /* 카드/사이드바 */
  --bg3:#1e1e1e;          /* 호버/활성 */
  --bg4:#2a2a2a;          /* 강조 호버 */
  --border:#2a2a2a;       /* 기본 경계 */
  --border2:#3a3a3a;      /* 강조 경계 */
  --text:#f5f5f5;         /* 메인 텍스트 */
  --text2:#d0d0d0;        /* 보조 텍스트 */
  --muted:#808080;        /* 뮤트된 텍스트 */
  --muted2:#606060;       /* 더 뮤트 */

  /* 흑백 액센트 */
  --accent:#ffffff;       /* 순수 흰색 — 주요 강조 */
  --accent-dim:rgba(255,255,255,0.08);

  /* 상태 색 (가독성 필요) */
  --green:#4ade80;
  --orange:#fb923c;
  --red:#f87171;

  /* 타입 뱃지 — 흑백 계조 */
  --t1:#e5e5e5;  /* source */
  --t2:#c0c0c0;  /* entity */
  --t3:#a0a0a0;  /* concept */
  --t4:#808080;  /* comparison */
  --t5:#606060;  /* analysis */
  --t6:#404040;  /* overview */

  /* 타이포 & 레이아웃 */
  --font:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Helvetica,Arial,sans-serif;
  --mono:'SF Mono','JetBrains Mono','Fira Code',Menlo,monospace;
  --r-sm:4px; --r-md:6px; --r-lg:10px; --r-xl:14px;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.4);
  --shadow-md:0 4px 12px rgba(0,0,0,0.5);
  --shadow-lg:0 8px 24px rgba(0,0,0,0.6);
  --ease:cubic-bezier(.4,0,.2,1);
  --d-fast:120ms;
  --d-med:200ms;
  --d-slow:300ms;

  /* 사이드바 너비 (JS에서 동적 변경) */
  --side-w:280px;
}

*{margin:0;padding:0;box-sizing:border-box}
*:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:var(--r-sm)}
html,body{background:var(--bg);color:var(--text);}
body{font-family:var(--font);height:100vh;overflow:hidden;font-feature-settings:'cv02','cv03','cv04','cv11';-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:inherit;color:inherit}
button{cursor:pointer;transition:all var(--d-fast) var(--ease);}
button:active{transform:scale(0.97);}

/* ── Layout ── */
.app{display:grid;grid-template-columns:var(--side-w) 1fr;grid-template-rows:52px 1fr;height:100vh;position:relative;transition:grid-template-columns var(--d-med) var(--ease)}
.app.side-hidden{--side-w:0px}
.app.side-hidden .side{display:none}

/* 사이드바 리사이즈 핸들 */
.side-handle{position:absolute;top:52px;left:var(--side-w);bottom:0;width:6px;transform:translateX(-3px);cursor:ew-resize;z-index:40;transition:background var(--d-fast)}
.side-handle:hover,.side-handle.dragging{background:var(--accent-dim)}
.app.side-hidden .side-handle{display:none}

/* ── Header ── */
header{grid-column:1/-1;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:12px;backdrop-filter:blur(8px);position:relative;z-index:30}
header h1{font-size:14px;font-weight:700;white-space:nowrap;letter-spacing:-0.01em;display:flex;align-items:center;gap:8px}
header h1 .logo-mark{width:18px;height:18px;border:1.5px solid var(--text);border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;transform:rotate(45deg)}
header h1 .logo-mark span{transform:rotate(-45deg);color:var(--text)}
.h-side-toggle{background:none;border:1px solid var(--border);border-radius:var(--r-sm);color:var(--muted);padding:4px 8px;font-size:11px;font-family:var(--mono)}
.h-side-toggle:hover{color:var(--text);border-color:var(--border2)}
.h-model-select{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:4px 10px;font-size:11px;color:var(--text);cursor:pointer;transition:border-color var(--d-fast)}
.h-model-select:hover{border-color:var(--border2)}
.hstats{display:flex;gap:14px;margin-left:auto;font-size:11px;color:var(--muted)}
.hstats b{color:var(--text);font-weight:600;font-variant-numeric:tabular-nums}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s ease-in-out infinite;margin-right:4px}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(0.85)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Sidebar ── */
.side{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:opacity var(--d-med) var(--ease)}
.side input[type=text]{margin:12px 12px 0;padding:7px 11px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);color:var(--text);font-size:12px;outline:none;transition:border-color var(--d-fast),box-shadow var(--d-fast)}
.side input[type=text]:focus{border-color:var(--border2);box-shadow:0 0 0 3px var(--accent-dim)}
.side input[type=text]::placeholder{color:var(--muted2)}
.tabs{display:flex;margin:10px 12px 0;gap:2px}
.tabs button{flex:1;padding:7px 0;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;transition:all var(--d-fast)}
.tabs button:hover{color:var(--text2)}
.tabs button.on{color:var(--text);border-bottom-color:var(--text)}
.slist{flex:1;overflow-y:auto;padding:8px 0}
.grp-label{padding:8px 16px 4px;font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.08em;font-weight:600}

/* 페이지 리스트 아이템 */
.item{padding:7px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;border-left:2px solid transparent;transition:all var(--d-fast)}
.item:hover{background:var(--bg3);padding-left:20px}
.item.on{background:var(--bg3);border-left-color:var(--text);padding-left:20px}
.item .t{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)}
.item.on .t{color:var(--text);font-weight:500}
.item .m{font-size:10px;color:var(--muted2);font-variant-numeric:tabular-nums}

/* 타입 닷 — 흑백 계조 */
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:transform var(--d-fast)}
.item:hover .dot{transform:scale(1.3)}
.d-source{background:var(--t1)}.d-entity{background:var(--t2)}.d-concept{background:var(--t3)}
.d-technique{background:var(--t3)}.d-comparison{background:var(--t4)}.d-analysis{background:var(--t5)}
.d-overview{background:var(--t6)}
.d-missing,.d-unknown{background:transparent;border:1px dashed var(--muted2)}

/* 폴더 */
.folder-item{padding:7px 16px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);transition:all var(--d-fast);font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.folder-item:hover{background:var(--bg3);color:var(--text)}
.folder-item .arrow{font-size:9px;transition:transform var(--d-med) var(--ease);width:10px;text-align:center}
.folder-item .arrow.open{transform:rotate(90deg)}
.folder-item .fname{flex:1}
.folder-children{padding-left:10px;animation:slide-down var(--d-med) var(--ease)}
@keyframes slide-down{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* 로그 */
.log-item{padding:8px 16px;font-size:12px;transition:background var(--d-fast)}
.log-item:hover{background:var(--bg3)}
.log-item .date{color:var(--muted2);font-family:var(--mono);font-size:10px;letter-spacing:-0.02em}
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;text-transform:uppercase;margin:0 4px;letter-spacing:0.04em}
.b-ingest,.b-query,.b-lint,.b-maintenance{background:var(--bg4);color:var(--text2)}

/* ── Status bar ── */
.status-bar{border-top:1px solid var(--border);padding:12px 16px;display:flex;flex-direction:column;gap:6px;font-size:11px;background:var(--bg2)}
.status-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.status-action{font-size:10px;padding:2px 8px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;transition:all var(--d-fast);margin-left:4px}
.status-action:hover{color:var(--text);border-color:var(--text);background:var(--bg3)}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:all var(--d-med)}
.status-dot.ok{background:var(--green);box-shadow:0 0 8px rgba(74,222,128,0.5)}
.status-dot.err{background:var(--red);box-shadow:0 0 8px rgba(248,113,113,0.4)}
.status-dot.loading{background:var(--orange);animation:blink 1s infinite}
.status-label{color:var(--muted)}.status-label b{color:var(--text);font-weight:500;font-family:var(--mono);font-size:10px}

/* ── Main ── */
main{display:flex;flex-direction:column;overflow:hidden;min-width:0}
.toolbar{display:flex;align-items:center;padding:8px 18px;border-bottom:1px solid var(--border);gap:4px;background:var(--bg);position:relative;z-index:20}
.toolbar .bc{margin-left:auto;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;max-width:50%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.toolbar .bc b{color:var(--text);font-weight:600}

/* ── 카테고리 드롭다운 ── */
.cat{position:relative}
.cat-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:transparent;border:1px solid transparent;border-radius:var(--r-md);color:var(--text2);font-size:13px;font-weight:500;transition:all var(--d-fast)}
.cat-btn .cat-icon{font-size:11px;opacity:.7;font-family:var(--mono)}
.cat-btn .cat-caret{font-size:9px;opacity:.5;transition:transform var(--d-fast)}
.cat-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border)}
.cat-btn:hover .cat-caret{opacity:1}
.cat.open .cat-btn{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.cat.open .cat-caret{transform:rotate(180deg);opacity:1}
.cat.has-active .cat-btn{color:var(--text);background:var(--bg3);border-color:var(--border2)}
.cat.has-active .cat-btn::before{content:'';position:absolute;top:-1px;left:8px;right:8px;height:2px;background:var(--text);border-radius:0 0 2px 2px}

.cat-menu{position:absolute;top:calc(100% + 4px);left:0;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-md);min-width:220px;padding:6px;box-shadow:var(--shadow-lg);z-index:100;display:none;animation:menu-pop var(--d-med) var(--ease)}
.cat.open .cat-menu{display:block}
@keyframes menu-pop{from{opacity:0;transform:translateY(-4px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.cat-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--r-sm);cursor:pointer;color:var(--text2);font-size:13px;transition:all var(--d-fast);background:transparent;border:none;width:100%;text-align:left;position:relative}
.cat-item:hover{background:var(--bg3);color:var(--text);padding-left:14px}
.cat-item.active{background:var(--bg3);color:var(--text);font-weight:500}
.cat-item.active::before{content:'';position:absolute;left:4px;top:50%;transform:translateY(-50%);width:3px;height:16px;background:var(--text);border-radius:2px}
.cat-item .ci-icon{font-family:var(--mono);font-size:12px;width:16px;text-align:center;opacity:.7;flex-shrink:0}
.cat-item:hover .ci-icon,.cat-item.active .ci-icon{opacity:1}
.cat-item .ci-label{flex:1}
.cat-item .ci-sub{font-size:10px;color:var(--muted2);margin-left:auto;font-family:var(--mono);letter-spacing:-0.02em}
.cat-sep{height:1px;background:var(--border);margin:4px 0}
.cat-header{padding:6px 12px 4px;font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.06em;font-weight:700}

.content{flex:1;overflow-y:auto;position:relative;scroll-behavior:smooth}
.content > *{animation:fade-in var(--d-slow) var(--ease)}
@keyframes fade-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Page ── */
.page{max-width:820px;margin:0 auto;padding:36px 44px}
.page .pmeta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.tag{padding:3px 9px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;font-size:10px;color:var(--muted);text-transform:lowercase}
.tbadge{padding:3px 9px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.page-actions{margin-left:auto;display:flex;gap:4px}
.page-actions button{padding:5px 10px;font-size:11px;background:transparent;border:1px solid var(--border);border-radius:var(--r-sm);color:var(--muted);transition:all var(--d-fast)}
.page-actions button:hover{color:var(--text);border-color:var(--border2);background:var(--bg3)}
.page-actions button.danger:hover{color:var(--red);border-color:var(--red)}

/* 폴더 뷰 — 연속된 페이지 */
.folder-view{max-width:820px;margin:0 auto;padding:36px 44px}
.folder-view-header{padding-bottom:20px;border-bottom:2px solid var(--border);margin-bottom:24px;display:flex;align-items:baseline;gap:12px}
.folder-view-header h1{font-size:24px;font-weight:700;letter-spacing:-0.02em}
.folder-view-header .meta{font-size:12px;color:var(--muted);margin-left:auto}
.folder-page-item{margin-bottom:48px;padding-bottom:48px;border-bottom:1px dashed var(--border);scroll-margin-top:20px}
.folder-page-item:last-child{border-bottom:none}
.folder-page-item .page-ref{font-size:11px;color:var(--muted2);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.folder-page-item .page-ref-type{padding:1px 7px;background:var(--bg3);border-radius:3px;border:1px solid var(--border)}
.folder-page-item .page-ref-link{margin-left:auto;font-family:var(--font);text-transform:none;color:var(--muted)}
.folder-page-item .page-ref-link:hover{color:var(--text);cursor:pointer}

/* 스크롤 스파이 */
.scroll-spy{position:fixed;right:24px;top:120px;width:160px;max-height:60vh;overflow-y:auto;font-size:11px;display:none;z-index:10}
.scroll-spy.show{display:block}
.scroll-spy .sp-item{padding:4px 10px;color:var(--muted2);cursor:pointer;border-left:2px solid transparent;transition:all var(--d-fast)}
.scroll-spy .sp-item:hover{color:var(--text);border-left-color:var(--muted)}
.scroll-spy .sp-item.on{color:var(--text);border-left-color:var(--text)}

/* ── Markdown ── */
.md{line-height:1.7;font-size:15px;color:var(--text2)}
.md h1{font-size:28px;margin:0 0 16px;padding-bottom:8px;border-bottom:1px solid var(--border);color:var(--text);letter-spacing:-0.02em;font-weight:700}
.md h2{font-size:22px;margin:32px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border);color:var(--text);letter-spacing:-0.015em;font-weight:700}
.md h3{font-size:17px;margin:24px 0 10px;color:var(--text);font-weight:600}
.md p{margin:0 0 16px}
.md a{color:var(--text);text-decoration:underline;text-decoration-color:var(--muted);text-underline-offset:3px;transition:color var(--d-fast),text-decoration-color var(--d-fast)}
.md a:hover{color:var(--text);text-decoration-color:var(--text)}
.md code{background:var(--bg3);padding:2px 6px;border-radius:var(--r-sm);font-family:var(--mono);font-size:.86em;color:var(--text)}
.md pre{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;overflow-x:auto;margin:0 0 16px}
.md pre code{background:none;padding:0}
.md ul,.md ol{margin:0 0 16px;padding-left:24px}.md li{margin:4px 0}
.md blockquote{border-left:3px solid var(--text);padding:4px 16px;color:var(--muted);margin:0 0 16px;background:var(--bg2);border-radius:0 var(--r-md) var(--r-md) 0}
.md table{border-collapse:collapse;width:100%;margin:0 0 16px;font-size:13px}
.md th,.md td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.md th{background:var(--bg3);font-weight:600;color:var(--text)}
.md strong{color:var(--text);font-weight:600}.md hr{border:none;border-top:1px solid var(--border);margin:24px 0}

/* Callout */
.callout{border-left:3px solid var(--text);background:var(--bg2);padding:12px 16px;border-radius:0 var(--r-md) var(--r-md) 0;margin:0 0 16px}
.callout.callout-warning{border-left-color:var(--orange)}
.callout.callout-danger{border-left-color:var(--red)}
.callout.callout-tip{border-left-color:var(--green)}
.callout.callout-info{border-left-color:var(--text)}
.callout-title{font-weight:700;font-size:11px;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text)}

/* ── Panels ── */
.panel{max-width:760px;margin:0 auto;padding:36px 44px}
.panel h2{font-size:22px;margin-bottom:8px;letter-spacing:-0.015em;font-weight:700;color:var(--text)}
.panel p.desc{color:var(--muted);font-size:13px;margin-bottom:20px;line-height:1.6}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-md);color:var(--text);font-size:13px;outline:none;transition:all var(--d-fast)}
.field input:hover,.field textarea:hover,.field select:hover{border-color:var(--border2)}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--text);background:var(--bg)}
.field textarea{min-height:200px;font-family:var(--mono);font-size:13px;line-height:1.5;resize:vertical}

.btn{padding:10px 22px;border:none;border-radius:var(--r-md);font-size:13px;font-weight:600;transition:all var(--d-fast);display:inline-flex;align-items:center;gap:6px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary,.btn-green,.btn-accent{background:var(--text);color:var(--bg)}
.btn-primary:hover:not(:disabled),.btn-green:hover:not(:disabled),.btn-accent:hover:not(:disabled){background:var(--text);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn-orange{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.btn-orange:hover:not(:disabled){background:var(--bg4);transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover:not(:disabled){color:var(--text);border-color:var(--border2);background:var(--bg3)}

.result-box{margin-top:18px;padding:14px 16px;border-radius:var(--r-md);font-size:13px;line-height:1.6;white-space:pre-wrap;font-family:var(--mono);max-height:500px;overflow-y:auto;animation:fade-in var(--d-med) var(--ease)}
.result-box.ok{background:rgba(74,222,128,0.06);border:1px solid rgba(74,222,128,0.25);color:var(--text)}
.result-box.err{background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.25);color:var(--text)}
.result-box.info{background:var(--bg2);border:1px solid var(--border);color:var(--text)}
.result-box .md{font-family:var(--font);white-space:normal;color:var(--text2)}

/* ── Edit ── */
.edit-area{width:100%;min-height:400px;font-family:var(--mono);font-size:13px;line-height:1.5;resize:vertical;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-md);color:var(--text);padding:14px;outline:none;transition:border-color var(--d-fast)}
.edit-area:focus{border-color:var(--text);background:var(--bg)}
.edit-actions{display:flex;gap:10px;margin-top:12px}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100;animation:fade-in var(--d-med) var(--ease)}
.modal-bg.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-xl);padding:28px;width:440px;max-width:90vw;box-shadow:var(--shadow-lg);animation:modal-pop var(--d-med) var(--ease)}
@keyframes modal-pop{from{transform:scale(0.95);opacity:0}to{transform:scale(1);opacity:1}}
.modal h3{font-size:17px;margin-bottom:18px;font-weight:700;letter-spacing:-0.01em}
.modal .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.modal .actions button{padding:8px 16px;border-radius:var(--r-md);font-size:13px;border:1px solid var(--border);background:transparent;color:var(--text2);font-weight:500;transition:all var(--d-fast)}
.modal .actions button:hover{background:var(--bg3);color:var(--text)}
.modal .actions button.primary{background:var(--text);border-color:var(--text);color:var(--bg);font-weight:600}
.modal .actions button.primary:hover{background:var(--text);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.modal .actions button.danger{background:var(--red);border-color:var(--red);color:var(--bg)}

/* ── Toast ── */
.toast-wrap{position:fixed;top:64px;right:24px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-md);padding:10px 14px;font-size:13px;color:var(--text);min-width:240px;max-width:400px;box-shadow:var(--shadow-md);pointer-events:auto;animation:toast-in var(--d-med) var(--ease)}
.toast.ok{border-left:3px solid var(--green)}
.toast.err{border-left:3px solid var(--red)}
.toast.info{border-left:3px solid var(--text)}
@keyframes toast-in{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.closing{animation:toast-out var(--d-med) var(--ease) forwards}
@keyframes toast-out{to{transform:translateX(100%);opacity:0}}

/* ── Reflect ── */
.reflect-section{margin-bottom:16px;border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;transition:border-color var(--d-fast)}
.reflect-section:hover{border-color:var(--border2)}
.reflect-hdr{padding:12px 16px;background:var(--bg2);font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background var(--d-fast)}
.reflect-hdr:hover{background:var(--bg3)}
.reflect-hdr .r-arrow{font-size:9px;transition:transform var(--d-med) var(--ease);width:10px}
.reflect-hdr .r-arrow.open{transform:rotate(90deg)}
.reflect-body{padding:16px;display:none;font-size:13px;line-height:1.7}
.reflect-body.show{display:block;animation:slide-down var(--d-med) var(--ease)}
.reflect-badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;margin-left:8px;background:var(--bg4);color:var(--text2);letter-spacing:0.04em}
.rb-overdue{background:rgba(248,113,113,0.15);color:var(--red)}

/* ── Index strategy banner ── */
.idx-banner{padding:8px 18px;font-size:12px;border-bottom:1px solid var(--border);display:none;align-items:center;gap:10px;background:var(--bg2)}
.idx-banner.show{display:flex;animation:slide-down var(--d-med) var(--ease)}
.idx-banner.warn{border-bottom-color:var(--orange)}
.idx-banner.danger{border-bottom-color:var(--red)}
.idx-banner .idx-close{margin-left:auto;background:none;border:none;color:inherit;font-size:16px;opacity:.5;transition:opacity var(--d-fast)}
.idx-banner .idx-close:hover{opacity:1}
.idx-badge{font-size:10px;padding:2px 7px;border-radius:var(--r-sm);font-weight:700;font-family:var(--mono);text-transform:uppercase;background:var(--bg3);color:var(--text);border:1px solid var(--border)}

/* ── Wiki ratio gauge ── */
.wr-gauge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);position:relative;cursor:default}
.wr-bar{width:40px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.wr-fill{height:100%;border-radius:2px;transition:width var(--d-slow) var(--ease)}
.wr-val{font-weight:700;font-variant-numeric:tabular-nums;min-width:30px;color:var(--text)}
.wr-tip{display:none;position:absolute;top:130%;right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-md);padding:8px 12px;font-size:11px;white-space:nowrap;z-index:50;color:var(--text);box-shadow:var(--shadow-md)}
.wr-gauge:hover .wr-tip{display:block;animation:fade-in var(--d-fast) var(--ease)}

/* ── Query files read ── */
.qf-summary{font-size:12px;color:var(--muted);margin:12px 0 8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.qf-summary b{color:var(--text);font-weight:600}
.qf-toggle{font-size:11px;color:var(--text2);cursor:pointer;border:1px solid var(--border);background:var(--bg3);padding:2px 10px;border-radius:12px;transition:all var(--d-fast)}
.qf-toggle:hover{color:var(--text);border-color:var(--border2)}
.qf-list{font-size:11px;font-family:var(--mono);background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 14px;margin-bottom:12px;max-height:200px;overflow-y:auto;display:none}
.qf-list.show{display:block;animation:slide-down var(--d-med) var(--ease)}
.qf-list .qf-wiki{color:var(--text)}
.qf-list .qf-raw{color:var(--muted)}
.qf-list .qf-other{color:var(--muted2)}

/* ── Citation badges ── */
.cite-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:16px;font-size:10px;font-weight:700;color:var(--bg);background:var(--text);padding:0 5px;border-radius:8px;cursor:pointer;vertical-align:super;line-height:1;margin:0 2px;position:relative;transition:all var(--d-fast)}
.cite-badge:hover{transform:scale(1.1);background:var(--text)}
.cite-tip{display:none;position:absolute;bottom:140%;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-md);padding:6px 10px;font-size:11px;font-weight:500;white-space:nowrap;color:var(--text);z-index:50;pointer-events:none;box-shadow:var(--shadow-md)}
.cite-badge:hover .cite-tip{display:block}

/* ── Table (Prov/History) ── */
.prov-table,.hist-table{width:100%;border-collapse:collapse;font-size:13px}
.prov-table th,.hist-table th{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border2);color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:0.06em;font-weight:700}
.prov-table td,.hist-table td{padding:10px 12px;border-bottom:1px solid var(--border);transition:background var(--d-fast)}
.prov-table tr:hover td,.hist-table tr:hover td{background:var(--bg3)}
.prov-page{color:var(--text);cursor:pointer;font-weight:500}
.prov-page:hover{text-decoration:underline}
.prov-bar{display:inline-block;height:4px;border-radius:2px;min-width:4px;background:var(--text)}
.prov-cov{font-variant-numeric:tabular-nums;font-weight:700}
.prov-low{color:var(--red)}.prov-mid{color:var(--orange)}.prov-high{color:var(--green)}
.hist-hash{font-family:var(--mono);font-size:11px;color:var(--muted)}
.hist-source{font-weight:500;color:var(--text)}
.hist-date{color:var(--muted);font-size:11px;font-family:var(--mono)}
.hist-files{color:var(--muted);font-size:12px;text-align:center;font-variant-numeric:tabular-nums}
.btn-revert{padding:4px 12px;font-size:11px;background:transparent;border:1px solid var(--border);border-radius:var(--r-sm);color:var(--muted);transition:all var(--d-fast)}
.btn-revert:hover:not(:disabled){background:var(--red);border-color:var(--red);color:var(--bg)}

/* ── Ingest result panel ── */
.ir-panel{max-width:1000px;margin:0 auto;padding:28px 40px}
.ir-split{display:grid;grid-template-columns:260px 1fr;gap:20px;min-height:400px;border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.ir-files{background:var(--bg2);padding:14px 0;overflow-y:auto;border-right:1px solid var(--border)}
.ir-file{padding:7px 16px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;border-left:2px solid transparent;transition:all var(--d-fast)}
.ir-file:hover{background:var(--bg3)}
.ir-file.on{background:var(--bg3);border-left-color:var(--text)}
.ir-file .ir-icon{font-size:11px;font-weight:700;width:18px;text-align:center;font-family:var(--mono)}
.ir-file .ir-icon.created{color:var(--green)}.ir-file .ir-icon.modified{color:var(--orange)}
.ir-file .ir-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)}
.ir-detail{padding:18px;overflow:auto;background:var(--bg)}
.ir-diff{font-family:var(--mono);font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-all}
.ir-diff .d-add{color:var(--green)}
.ir-diff .d-del{color:var(--red)}
.ir-diff .d-hdr{color:var(--text);font-weight:700}
.ir-preview{font-size:13px;line-height:1.6}
.ir-reasoning{margin-top:18px;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-md);font-size:13px;line-height:1.7;color:var(--text2)}
.ir-reasoning strong{color:var(--text)}
.ir-actions{margin-top:18px;display:flex;gap:10px}

/* ── Claude 캐릭터 (floating) ── */
.claude-char{position:fixed;z-index:150;width:64px;height:64px;cursor:pointer;transition:transform var(--d-med) var(--ease),opacity var(--d-med);filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4));user-select:none}
.claude-char:hover{transform:scale(1.15)}
.claude-char.hidden{opacity:0;pointer-events:none;transform:scale(0.5)}
/* 하얀 배경에서는 inverted 필요 (다크 UI이므로 흰 테두리) */
.claude-char::before{content:'';position:absolute;inset:-4px;border-radius:50%;background:radial-gradient(circle,var(--text) 0%,transparent 70%);opacity:0;transition:opacity var(--d-med)}
.claude-char:hover::before{opacity:0.15}
.claude-char svg{width:100%;height:100%}
.claude-char svg .body{fill:var(--text)!important}
.claude-char svg .eye{fill:var(--bg)!important}
.claude-char svg .shadow{fill:var(--text)!important}

/* 말풍선 힌트 */
.claude-bubble{position:fixed;z-index:149;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-md);padding:8px 12px;font-size:12px;color:var(--text);box-shadow:var(--shadow-md);pointer-events:none;max-width:200px;opacity:0;transform:translateY(4px);transition:all var(--d-med) var(--ease)}
.claude-bubble.show{opacity:1;transform:translateY(0)}
.claude-bubble::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--bg2)}

/* ── 챗봇 패널 ── */
.chat-panel{position:fixed;right:20px;bottom:20px;width:380px;max-width:calc(100vw - 40px);height:520px;max-height:calc(100vh - 40px);background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-xl);box-shadow:var(--shadow-lg);z-index:200;display:none;flex-direction:column;overflow:hidden;animation:chat-slide-in var(--d-med) var(--ease)}
.chat-panel.open{display:flex}
@keyframes chat-slide-in{from{opacity:0;transform:translateY(20px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}

.chat-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg3)}
.chat-header .ch-avatar{width:28px;height:28px;flex-shrink:0}
.chat-header .ch-avatar svg .body{fill:var(--text)!important}
.chat-header .ch-avatar svg .eye{fill:var(--bg)!important}
.chat-header .ch-avatar svg .shadow{fill:var(--text)!important;opacity:0.3!important}
.chat-header .ch-title{flex:1}
.chat-header .ch-title h4{font-size:13px;font-weight:700;letter-spacing:-0.01em}
.chat-header .ch-title p{font-size:11px;color:var(--muted);margin-top:1px}
.chat-header .ch-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 4px}
.chat-header .ch-close:hover{color:var(--text)}

.chat-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.chat-msg{max-width:85%;padding:8px 12px;border-radius:var(--r-md);font-size:13px;line-height:1.5;animation:msg-in var(--d-med) var(--ease);word-wrap:break-word}
@keyframes msg-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.chat-msg.user{align-self:flex-end;background:var(--text);color:var(--bg);border-bottom-right-radius:2px}
.chat-msg.bot{align-self:flex-start;background:var(--bg3);color:var(--text);border-bottom-left-radius:2px;border:1px solid var(--border)}
.chat-msg.bot .md{font-size:13px;line-height:1.5}
.chat-msg.bot .md p{margin:0 0 6px}
.chat-msg.bot .md p:last-child{margin:0}
.chat-msg.bot .md code{background:var(--bg);padding:1px 4px;border-radius:3px;font-size:11px}
.chat-msg.typing{background:var(--bg3);color:var(--muted);font-style:italic;font-size:12px}
.chat-msg.typing::after{content:'...';animation:typing-dots 1.2s infinite}
@keyframes typing-dots{0%,20%{content:'·'}40%{content:'··'}60%,100%{content:'···'}}

.chat-suggestions{padding:0 14px 10px;display:flex;flex-wrap:wrap;gap:6px}
.chat-suggestions button{font-size:11px;padding:5px 10px;background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--muted);transition:all var(--d-fast)}
.chat-suggestions button:hover{color:var(--text);border-color:var(--border2);background:var(--bg3)}

.chat-input{border-top:1px solid var(--border);padding:10px 12px;background:var(--bg3);display:flex;gap:8px;align-items:flex-end}
.chat-input textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:8px 10px;color:var(--text);font-size:13px;font-family:inherit;resize:none;min-height:36px;max-height:100px;outline:none;transition:border-color var(--d-fast)}
.chat-input textarea:focus{border-color:var(--border2)}
.chat-input button{background:var(--text);color:var(--bg);border:none;border-radius:var(--r-md);padding:8px 14px;font-size:12px;font-weight:600;flex-shrink:0;transition:all var(--d-fast)}
.chat-input button:disabled{opacity:.4;cursor:not-allowed}
.chat-input button:hover:not(:disabled){transform:translateY(-1px);box-shadow:var(--shadow-sm)}

/* ── Guide streaming ── */
.guide-controls{display:flex;gap:8px;margin-bottom:16px;align-items:center;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-md);font-size:12px;color:var(--muted)}
.guide-controls .gc-label{margin-right:auto}
.guide-controls button{padding:4px 10px;background:transparent;border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text2);font-size:11px;transition:all var(--d-fast)}
.guide-controls button:hover{color:var(--text);border-color:var(--border2);background:var(--bg3)}
.guide-controls .gc-progress{display:inline-block;width:80px;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin:0 8px}
.guide-controls .gc-progress-fill{height:100%;background:var(--text);transition:width 80ms linear}
.stream-cursor{display:inline-block;width:8px;height:1.2em;background:var(--text);vertical-align:text-bottom;margin-left:2px;animation:stream-blink 0.8s infinite}
@keyframes stream-blink{0%,50%{opacity:1}51%,100%{opacity:0}}

/* ── Graph ── */
.graph-wrap{width:100%;height:100%;position:absolute;top:0;left:0}
.graph-wrap canvas{width:100%;height:100%;cursor:grab}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--border2)}

/* ── 반응형 ── */
@media (max-width:900px){
  .app{grid-template-columns:0 1fr}
  .side{position:absolute;left:0;top:52px;bottom:0;width:280px;z-index:30;box-shadow:var(--shadow-lg)}
  .app.side-visible .side{display:flex}
  .app:not(.side-visible) .side{display:none}
  .side-handle{display:none}
  .page,.panel,.folder-view{padding:24px 20px}
}
</style>
</head>
<body>
<div class="app" id="app">
  <header>
    <button class="h-side-toggle" onclick="toggleSidebar()" title="Toggle sidebar (Cmd/Ctrl+B)" aria-label="Toggle sidebar">⟷</button>
    <h1><span class="logo-mark"><span>◆</span></span> Karpathy LLM dashboard</h1>
    <select class="h-model-select" id="modelSelect" onchange="onModelChange()" title="Claude model"></select>
    <div class="hstats" id="hstats"></div>
    <button id="langToggle" class="h-side-toggle" onclick="toggleLang()" title="Language" style="margin-left:4px;font-family:var(--font);font-weight:600">EN</button>
  </header>
  <aside class="side">
    <input type="text" id="q" data-i18n-ph="search_placeholder" placeholder="Search pages...">
    <div class="tabs">
      <button class="on" data-t="tree" data-i18n="tab_tree">Tree</button>
      <button data-t="pages" data-i18n="tab_pages">Pages</button>
      <button data-t="log" data-i18n="tab_log">Log</button>
    </div>
    <div class="slist" id="slist"></div>
    <div class="status-bar" id="statusBar">
      <div class="status-row"><div class="status-dot loading" id="dotClaude"></div><span class="status-label"><span data-i18n="status_claude">Claude CLI</span> <b id="lblClaude">checking...</b></span></div>
      <div class="status-row"><div class="status-dot loading" id="dotObsidian"></div><span class="status-label">Obsidian <b id="lblObsidian">checking...</b></span></div>
    </div>
  </aside>
  <main>
    <div class="idx-banner" id="idxBanner"><span id="idxBannerText"></span><button class="idx-close" onclick="this.parentElement.classList.remove('show')">&times;</button></div>
    <div class="toolbar" id="toolbar"></div>
    <div class="content" id="content"></div>
  </main>
  <div class="side-handle" id="sideHandle"></div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<!-- 떠다니는 Claude 캐릭터 -->
<div class="claude-char" id="claudeChar" onclick="toggleChat()" title="Ask Claude" role="button" aria-label="Open assistant">
  <!-- SVG는 JS에서 fetch해서 inline 삽입 (CSS에서 fill 제어 가능하게) -->
</div>
<div class="claude-bubble" id="claudeBubble"></div>

<!-- 챗봇 패널 -->
<div class="chat-panel" id="chatPanel" role="dialog" aria-label="Dashboard assistant">
  <div class="chat-header">
    <div class="ch-avatar" id="chAvatar"></div>
    <div class="ch-title">
      <h4 id="chTitle">Dashboard Assistant</h4>
      <p id="chSubtitle">Ask about dashboard features</p>
    </div>
    <button class="ch-close" onclick="toggleChat()" aria-label="Close">×</button>
  </div>
  <div class="chat-body" id="chatBody"></div>
  <div class="chat-suggestions" id="chatSuggestions"></div>
  <div class="chat-input">
    <textarea id="chatInput" rows="1" onkeydown="onChatKey(event)" placeholder="Ask a question..."></textarea>
    <button id="chatSend" onclick="sendChat()">Send</button>
  </div>
</div>

<!-- Modals -->
<div class="modal-bg" id="modalFolder"><div class="modal"><h3>New Folder</h3>
  <div class="field"><label>Folder Name</label><input type="text" id="newFolderName" placeholder="research-topic"></div>
  <div class="field"><label>Parent</label><select id="newFolderParent"><option value="">wiki/ (root)</option></select></div>
  <div class="actions"><button onclick="closeModals()">Cancel</button><button class="primary" onclick="doCreateFolder()">Create</button></div>
</div></div>
<div class="modal-bg" id="modalPage"><div class="modal"><h3>New Page</h3>
  <div class="field"><label>Title</label><input type="text" id="newPageTitle" placeholder="Page Title"></div>
  <div class="field"><label>Type</label><select id="newPageType"><option value="concept">Concept</option><option value="entity">Entity</option><option value="source">Source</option><option value="analysis">Analysis</option><option value="comparison">Comparison</option><option value="overview">Overview</option></select></div>
  <div class="field"><label>Folder</label><select id="newPageFolder"><option value="">wiki/ (root)</option></select></div>
  <div class="actions"><button onclick="closeModals()">Cancel</button><button class="primary" onclick="doCreatePage()">Create</button></div>
</div></div>
<div class="modal-bg" id="modalDelete"><div class="modal"><h3>Delete Page</h3>
  <p style="color:var(--muted);font-size:13px;margin-bottom:12px">이 페이지를 삭제합니다. 되돌릴 수 없습니다.</p>
  <p style="font-size:14px"><b id="deletePageName"></b></p>
  <div class="actions"><button onclick="closeModals()">Cancel</button><button class="danger" onclick="confirmDelete()">Delete</button></div>
</div></div>

<script>
const TC={source:'#3fb950',entity:'#58a6ff',concept:'#bc8cff',comparison:'#d29922',analysis:'#39d2c0',overview:'#8b949e',missing:'#f85149',unknown:'#f85149'};
let D=null,folders=null,view='page',cur=null,curFolder=null,tab='tree',sq='',lastHash='',editing=false;

// ─── i18n ───
const I18N={
  en:{
    search_placeholder:'Search pages...',
    tab_tree:'Tree', tab_pages:'Pages', tab_log:'Log',
    status_claude:'Claude CLI',
    nav_page:'Page', nav_ingest:'+ Ingest', nav_query:'Query', nav_lint:'Lint',
    nav_reflect:'Reflect', nav_write:'Write', nav_compare:'Compare', nav_review:'Review',
    nav_search:'Search', nav_graph:'Graph', nav_history:'History', nav_provenance:'Provenance',
    nav_folder:'+ Folder', nav_new_page:'+ Page', nav_guide:'? Guide',

// ─── Toast ───
function toast(msg,type){type=type||'info';
  var w=document.getElementById('toastWrap');if(!w)return;
  var el=document.createElement('div');el.className='toast '+type;el.textContent=msg;
  w.appendChild(el);
  setTimeout(function(){el.classList.add('closing');setTimeout(function(){el.remove();},220);},3500);
}

// ─── Sidebar resize & toggle ───
var SIDE_W_KEY='karpathy-side-w', SIDE_HIDDEN_KEY='karpathy-side-hidden';
function applySidebar(){
  var app=document.getElementById('app');
  var hidden=localStorage.getItem(SIDE_HIDDEN_KEY)==='1';
  app.classList.toggle('side-hidden',hidden);
  if(!hidden){
    var w=parseInt(localStorage.getItem(SIDE_W_KEY))||280;
    w=Math.max(220,Math.min(500,w));
    // .app 자체에 inline으로 설정 (--side-w는 .side-hidden이 override 가능)
    app.style.setProperty('--side-w',w+'px');
    var handle=document.getElementById('sideHandle');
    if(handle)handle.style.left=w+'px';
  }else{
    var handle=document.getElementById('sideHandle');
    if(handle)handle.style.left='';
  }
}
function toggleSidebar(){
  var hidden=localStorage.getItem(SIDE_HIDDEN_KEY)==='1';
  localStorage.setItem(SIDE_HIDDEN_KEY,hidden?'0':'1');
  applySidebar();
}
function initSidebarResize(){
  var handle=document.getElementById('sideHandle');if(!handle)return;
  var app=document.getElementById('app');
  var dragging=false;
  handle.addEventListener('mousedown',function(e){
    // 사이드바가 숨겨진 상태에서는 드래그 비활성
    if(app.classList.contains('side-hidden'))return;
    dragging=true;handle.classList.add('dragging');document.body.style.cursor='ew-resize';document.body.style.userSelect='none';
    e.preventDefault();
  });
  document.addEventListener('mousemove',function(e){
    if(!dragging)return;
    var w=Math.max(220,Math.min(500,e.clientX));
    app.style.setProperty('--side-w',w+'px');
    handle.style.left=w+'px';
  });
  document.addEventListener('mouseup',function(e){
    if(!dragging)return;
    dragging=false;handle.classList.remove('dragging');document.body.style.cursor='';document.body.style.userSelect='';
    var w=parseInt(getComputedStyle(app).getPropertyValue('--side-w'))||280;
    localStorage.setItem(SIDE_W_KEY,w);
  });
}
// 키보드 단축키: Cmd/Ctrl+B — 사이드바 토글
document.addEventListener('keydown',function(e){
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='b'){
    e.preventDefault();toggleSidebar();
  }
});

var MODELS=[], CURRENT_MODEL='default';
async function loadSettings(){
  try{
    var r=await fetch('/api/settings');var d=await r.json();
    MODELS=d.models||[];CURRENT_MODEL=(d.settings||{}).model||'default';
    var sel=document.getElementById('modelSelect');if(sel){
      sel.innerHTML=MODELS.map(function(m){
        return '<option value="'+m.id+'"'+(m.id===CURRENT_MODEL?' selected':'')+'>'+m.label+'</option>';
      }).join('');
    }
  }catch(e){}
}
async function onModelChange(){
  var sel=document.getElementById('modelSelect');if(!sel)return;
  var model=sel.value;
  try{
    var r=await fetch('/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:model})});
    var d=await r.json();
    if(d.ok){CURRENT_MODEL=model;toast('Model: '+(MODELS.find(function(m){return m.id===model;})||{}).label,'ok');}
    else{toast('Model change failed: '+d.error,'err');sel.value=CURRENT_MODEL;}
  }catch(e){toast(t('err_network')+e.message,'err');}
}

// ─── marked callout extension ───
const renderer=new marked.Renderer();
const origBlockquote=renderer.blockquote;
renderer.blockquote=function(body){
  // Handle both string and object inputs
  let text = typeof body === 'string' ? body : (body && body.text ? body.text : String(body));
  const m=text.match(/^\s*<p>\s*\[!(warning|danger|tip|info|note)\]\s*(.*?)<\/p>/i);
  if(m){
    const type=m[1].toLowerCase();const title=m[2]||type;
    const rest=text.replace(m[0],'');
    return `<div class="callout callout-${type}"><div class="callout-title">${title}</div>${rest}</div>`;
  }
  return `<blockquote>${text}</blockquote>`;
};
marked.setOptions({renderer});

// ─── Init ───
async function init(){
  applyI18n();applySidebar();initSidebarResize();renderToolbar();
  await Promise.all([loadWiki(),loadFolders(),checkStatus(),loadSettings()]);
  render();
  setInterval(checkStatus,15000);setInterval(pollChanges,5000);checkReflectStatus();
  initClaudeCharacter();
  // URL hash 라우팅 — ?#view=ingest 등으로 특정 뷰 직접 진입 (스크린샷용)
  handleHashRoute();
  window.addEventListener('hashchange',handleHashRoute);
}
function handleHashRoute(){
  var h=(location.hash||'').replace(/^#/,'');
  if(!h)return;
  var params={};h.split('&').forEach(function(kv){var p=kv.split('=');if(p[0])params[p[0]]=decodeURIComponent(p[1]||'');});
  var v=params.view||params.v;
  if(v==='ingest')showIngest();
  else if(v==='query')showQuery();
  else if(v==='graph')showGraph();
  else if(v==='history')showHistory();
  else if(v==='provenance')showProvenance();
  else if(v==='write')showWrite();
  else if(v==='compare')showCompare();
  else if(v==='reflect')showReflect();
  else if(v==='lint')showLint();
  else if(v==='search')showSearch();
  else if(v==='guide')showGuide();
  else if(v==='schema')showSchema();
  if(params.chat==='1')setTimeout(function(){var p=document.getElementById('chatPanel');if(p&&!p.classList.contains('open'))toggleChat();},300);
}

var chatHistory=[];
var charPos={x:window.innerWidth-100,y:window.innerHeight-120};

async function initClaudeCharacter(){
  // SVG inline 삽입 (CSS의 fill 오버라이드가 작동하려면 inline 필요)
  try{
    var r=await fetch('claude_character.svg');
    var svg=await r.text();
    document.getElementById('claudeChar').innerHTML=svg;
    document.getElementById('chAvatar').innerHTML=svg;
  }catch(e){console.warn('Character SVG load failed',e);}

  // 최초 위치
  positionCharacter(charPos.x,charPos.y);

  // 주기적으로 살짝 이동 (랜덤 walk)
  charMoveInterval=setInterval(wanderCharacter,6000);

  // 첫 방문자에겐 말풍선 힌트 (localStorage)
  if(!localStorage.getItem('char_seen')){
    setTimeout(function(){showBubbleHint();},2000);
  }
}

function positionCharacter(x,y){
  var el=document.getElementById('claudeChar');if(!el)return;
  var maxX=window.innerWidth-80;
  var maxY=window.innerHeight-80;
  charPos.x=Math.max(20,Math.min(maxX,x));
  charPos.y=Math.max(60,Math.min(maxY,y));  // header 아래
  el.style.left=charPos.x+'px';
  el.style.top=charPos.y+'px';
  el.style.right='';el.style.bottom='';
}

function wanderCharacter(){
  // 챗 열려있으면 이동 안 함
  if(document.getElementById('chatPanel').classList.contains('open'))return;
  // 사이드바 영역 피하기
  var sideW=document.getElementById('app').classList.contains('side-hidden')?0:(parseInt(getComputedStyle(document.getElementById('app')).getPropertyValue('--side-w'))||280);
  var minX=sideW+20;
  var maxX=window.innerWidth-100;
  var maxY=window.innerHeight-120;
  var newX=minX+Math.random()*(maxX-minX);
  var newY=80+Math.random()*(maxY-80);
  animateCharacterTo(newX,newY);
}

function animateCharacterTo(tx,ty){
  var el=document.getElementById('claudeChar');if(!el)return;
  var startX=charPos.x,startY=charPos.y;
  var duration=1500;
  var t0=performance.now();
  function step(now){
    var p=Math.min(1,(now-t0)/duration);
    var ease=p<0.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
    var x=startX+(tx-startX)*ease;
    var y=startY+(ty-startY)*ease;
    positionCharacter(x,y);
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function showBubbleHint(){
  var bubble=document.getElementById('claudeBubble');if(!bubble)return;
  var char=document.getElementById('claudeChar');
  if(!char)return;
  var rect=char.getBoundingClientRect();
  bubble.textContent=LANG==='ko'?'기능이 궁금하면 클릭!':'Click me to ask!';
  bubble.style.left=(rect.left-40)+'px';
  bubble.style.top=(rect.top-44)+'px';
  bubble.classList.add('show');
  setTimeout(function(){bubble.classList.remove('show');},4000);
}

// 창 크기 변경 대응
window.addEventListener('resize',function(){
  positionCharacter(charPos.x,charPos.y);
});

// 드래그 이동
(function(){
  var dragging=false,dx=0,dy=0;
  document.addEventListener('mousedown',function(e){
    var c=e.target.closest('#claudeChar');
    if(!c)return;
    // 즉시 드래그 시작 — 단, 이동이 없으면 클릭으로 간주
    var startX=e.clientX,startY=e.clientY;
    dx=e.clientX-charPos.x;dy=e.clientY-charPos.y;
    var moved=false;
    function onMove(ev){
      if(Math.abs(ev.clientX-startX)+Math.abs(ev.clientY-startY)>5){moved=true;dragging=true;}
      if(dragging){positionCharacter(ev.clientX-dx,ev.clientY-dy);}
    }
    function onUp(ev){
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
      dragging=false;
    }
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
})();

function renderChatWelcome(){
  var isKo=LANG==='ko';

    ? '안녕하세요! 이 대시보드의 기능에 대해 무엇이든 물어보세요. 예를 들면:'

function addChatMsg(role,text){
  var body=document.getElementById('chatBody');
  var el=document.createElement('div');
  el.className='chat-msg '+role;
  if(role==='bot'){
    el.innerHTML='<div class="md">'+marked.parse(text)+'</div>';
  }else{
    el.textContent=text;
  }
  body.appendChild(el);
  body.scrollTop=body.scrollHeight;
  return el;
}

function onChatKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}
}

function askSuggestion(s){
  document.getElementById('chatInput').value=s;
  sendChat();
}

async function sendChat(){
  var input=document.getElementById('chatInput');
  var q=input.value.trim();
  if(!q)return;
  input.value='';
  document.getElementById('chatSuggestions').innerHTML='';
  addChatMsg('user',q);
  chatHistory.push({role:'user',content:q});
  var sendBtn=document.getElementById('chatSend');
  sendBtn.disabled=true;
  var typing=addChatMsg('typing',LANG==='ko'?'생각 중':'thinking');
  try{
    var r=await fetch('/api/assistant',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q,lang:LANG,history:chatHistory.slice(-6)})});
    var d=await r.json();
    typing.remove();
    if(d.ok&&d.answer){
      addChatMsg('bot',d.answer);
      chatHistory.push({role:'assistant',content:d.answer});
    }else{
      addChatMsg('bot',(LANG==='ko'?'오류: ':'Error: ')+(d.error||'unknown'));
    }
  }catch(e){
    typing.remove();
    addChatMsg('bot',(LANG==='ko'?'네트워크 오류: ':'Network error: ')+e.message);
  }
  sendBtn.disabled=false;
  input.focus();
}

async function checkStatus(){
  try{
    var r=await fetch('/api/status');var s=await r.json();
    // Claude
    setDot('dotClaude','lblClaude',s.claude.connected,s.claude.connected?s.claude.version:'');
    // Obsidian: 프로세스가 꺼졌으면 vault 정보는 stale이므로 표시 안 함
    var o=s.obsidian||{};
    var label='';
    var tip='';
    var registerBtn='';
    if(!o.process_running){
      label='off';
      tip=LANG==='ko'?'Obsidian 프로세스가 실행되지 않음':'Obsidian process not running';
    }else if(!o.config_path){
      label='on · config not found';
      tip=LANG==='ko'?'Obsidian 실행 중이지만 config 파일이 없음. 한 번이라도 Obsidian을 실행하세요.':'Obsidian is running but config file not found. Run Obsidian at least once.';
    }else if(!o.vault_registered){
      label='on · vault not registered';
      var registered=(o.registered_vaults||[]).join(' | ')||'(none)';
      tip=LANG==='ko'
        ?'이 폴더가 Obsidian에 vault로 등록되지 않음.\n프로젝트 경로: '+(o.project_path||'?')+'\n등록된 vault: '+registered+'\n\n아래 "Register" 버튼을 누르면 자동 등록됩니다.'
        :'This folder is not registered as a vault in Obsidian.\nProject: '+(o.project_path||'?')+'\nRegistered: '+registered+'\n\nClick "Register" below to add it automatically.';
      registerBtn=' <button class="status-action" onclick="registerObsidianVault(event)">Register</button>';
    }else{
      label='on · vault_open=' + (o.vault_open?'true':'false');
      if(!o.vault_open){
        tip=LANG==='ko'?'등록되어 있지만 현재 열려있지 않음. Obsidian에서 vault 전환.':'Registered but not currently open. Switch vault in Obsidian.';
      }else{
        tip=LANG==='ko'?'연결 정상':'Connected';
      }
    }
    var connected=!!(o.process_running && o.vault_registered && o.vault_open);
    setDot('dotObsidian','lblObsidian',connected,label);
    var lbl=document.getElementById('lblObsidian');
    if(lbl&&lbl.parentElement){
      lbl.parentElement.title=tip;
      // Register 버튼 부착 (vault not registered일 때만)
      var existing=lbl.parentElement.querySelector('.status-action');
      if(existing)existing.remove();
      if(registerBtn){
        lbl.parentElement.insertAdjacentHTML('beforeend',registerBtn);
      }
    }
  }catch(e){
    setDot('dotClaude','lblClaude',false,'');
    setDot('dotObsidian','lblObsidian',false,'');
  }
}

function setDot(did,lid,ok,txt){document.getElementById(did).className='status-dot '+(ok?'ok':'err');document.getElementById(lid).textContent=txt;}

async function registerObsidianVault(ev){
  var btn=(ev&&ev.target)?ev.target:null;
  if(btn){btn.disabled=true;btn.textContent='...';}
  try{
    var r=await fetch('/api/obsidian/register',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    var text=await r.text();
    var d;
    try{d=JSON.parse(text);}catch(e){
      toast((LANG==='ko'?'서버 응답 파싱 실패: ':'Bad server response: ')+text.substring(0,150),'err');
      console.error('register response not JSON:',text);
      if(btn){btn.disabled=false;btn.textContent='Register';}
      return;
    }
    if(d.ok){
      var msg=d.action==='already_registered'
        ?(LANG==='ko'?'이미 등록되어 있음 — open 플래그 활성화':'Already registered — opened')
        :(LANG==='ko'?'등록 완료! Obsidian 재시작하면 vault 목록에 나타납니다.':'Registered! Restart Obsidian to see it.');
      toast(msg+' ('+d.config_path+')','ok');
      setTimeout(checkStatus,500);
    }else{
      // 서버 에러 발생 시 자세한 정보 표시
      var errMsg=d.error||'unknown';
      if(d.endpoint)errMsg+=' [endpoint='+d.endpoint+']';
      toast((LANG==='ko'?'등록 실패: ':'Register failed: ')+errMsg,'err');
      console.error('register failed:',d);
    }
  }catch(e){
    toast((LANG==='ko'?'네트워크 오류: ':'Network error: ')+e.message,'err');
    console.error('register network error:',e);
  }
  if(btn){btn.disabled=false;btn.textContent='Register';}
}

  }catch(e){}

function renderTree(el){
  if(!folders){el.innerHTML='';return;}
  var h='';
  // 루트 페이지들 (wiki/ 직속)
  folders.pages.forEach(function(f){
    var p=D.pages.find(function(x){return x.filename===f;});if(!p)return;
    h+='<div class="item'+(cur===f?' on':'')+'" onclick="showPage(\''+f+'\')" style="padding-left:16px"><div class="dot d-'+p.type+'"></div><span class="t">'+esc(p.title)+'</span><span class="m">'+p.word_count+'w</span></div>';
  });
  // 하위 폴더들
  folders.children.forEach(function(c){
    var expanded=curFolder===c.path;
    // folder-item: arrow 클릭=toggle, 이름 클릭=폴더 뷰 열기
    h+='<div class="folder-item"><span class="arrow'+(expanded?' open':'')+'" onclick="toggleFolder(this.parentElement)">▶</span><span class="fname" onclick="showFolderView(\''+c.path+'\')" title="Open folder view">'+esc(c.name)+'/</span><span class="m">'+c.pages.length+'</span></div>';
    h+='<div class="folder-children" style="display:'+(expanded?'block':'none')+'">';
    c.pages.forEach(function(f){
      var p=D.pages.find(function(x){return x.filename===f;});
      var title=p?p.title:f; var tp=p?p.type:'unknown'; var wc=p?p.word_count+'w':'';
      h+='<div class="item'+(cur===f?' on':'')+'" onclick="showPage(\''+f+'\')"><div class="dot d-'+tp+'"></div><span class="t">'+esc(title)+'</span><span class="m">'+wc+'</span></div>';
    });
    h+='</div>';
  });
  el.innerHTML=h||'<div style="padding:40px 20px;text-align:center;color:var(--muted);font-size:12px">Empty wiki</div>';
}
function toggleFolder(el){
  var a=el.querySelector('.arrow'); var c=el.nextElementSibling;
  if(c.style.display==='none'){c.style.display='block';a.classList.add('open');}
  else{c.style.display='none';a.classList.remove('open');}
}

function renderPageList(el){
  const q=sq.toLowerCase();const f=D.pages.filter(p=>!q||p.title.toLowerCase().includes(q)||p.content.toLowerCase().includes(q)||p.tags.some(t=>t.toLowerCase().includes(q)));
  const g={};f.forEach(p=>{(g[p.type]=g[p.type]||[]).push(p);});let h='';

    h+=`<div class="grp-label">${t}s (${g[t].length})</div>`;g[t].forEach(p=>{h+=`<div class="item${cur===p.filename?' on':''}" onclick="showPage('${p.filename}')"><div class="dot d-${p.type}"></div><span class="t">${esc(p.title)}</span><span class="m">${p.word_count}w</span></div>`;});delete g[t];}
  for(const[t,ps]of Object.entries(g)){h+=`<div class="grp-label">${t}</div>`;ps.forEach(p=>{h+=`<div class="item${cur===p.filename?' on':''}" onclick="showPage('${p.filename}')"><div class="dot d-${p.type}"></div><span class="t">${esc(p.title)}</span><span class="m">${p.word_count}w</span></div>`;});}
  el.innerHTML=h||'<div style="padding:30px;text-align:center;color:var(--muted)">No pages</div>';
}

// ─── Folder view (연속된 페이지) ───
function showFolderView(folderPath){
  curFolder=folderPath;cur=null;setView('page');
  if(!folders||!D){return;}
  var folder=folders.children.find(function(c){return c.path===folderPath;});
  if(!folder){document.getElementById('content').innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">Folder not found</div>';return;}
  // breadcrumb
  document.getElementById('bc').innerHTML='<b>📁 '+esc(folder.name)+'/</b> · '+folder.pages.length+' pages';
  // 본문 렌더
  var pages=folder.pages.map(function(fn){return D.pages.find(function(p){return p.filename===fn;});}).filter(Boolean);
  // 제목순 정렬
  pages.sort(function(a,b){return a.title.localeCompare(b.title);});
  var h='<div class="folder-view">';
  h+='<div class="folder-view-header">';
  h+='<h1>'+esc(folder.name)+'/</h1>';
  h+='<span class="meta">'+pages.length+' pages · reading continuously</span>';
  h+='</div>';
  pages.forEach(function(p){
    var body=p.content.replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g,'[$2]($1.md)').replace(/\[\[([^\]]+)\]\]/g,'[$1]($1.md)');
    var citeMap={},citeN=0;
    body=body.replace(/\[\^(src-[a-z0-9-]+)\](?!:)/g,function(m,slug){if(!citeMap[slug])citeMap[slug]=++citeN;return '%%CITE:'+slug+'%%';});
    body=body.replace(/^\[\^src-[a-z0-9-]+\]:.*$/gm,'');
    var html=marked.parse(body);
    html=html.replace(/%%CITE:([a-z0-9-]+)%%/g,function(m,slug){
      var n=citeMap[slug]||'?';var srcPage='source-'+slug.replace('src-','');
      var srcData=D.pages.find(function(pp){return pp.filename===srcPage+'.md';});
      var tipText=srcData?srcData.title:srcPage;
      return '<span class="cite-badge" onclick="showPage(\''+srcPage+'.md\')">'+n+'<span class="cite-tip">'+esc(tipText)+'</span></span>';
    });
    var anchor='fp-'+p.filename.replace(/[^a-z0-9]/g,'-');
    h+='<div class="folder-page-item" id="'+anchor+'" data-page="'+p.filename+'">';
    h+='<div class="page-ref">';
    h+='<span class="page-ref-type">'+p.type+'</span>';
    h+='<span>'+esc(p.filename)+'</span>';
    h+='<span class="page-ref-link" onclick="showPage(\''+p.filename+'\')">open →</span>';
    h+='</div>';
    h+='<div class="md">'+html+'</div>';
    h+='</div>';
  });
  h+='</div>';
  // 스크롤 스파이
  var spy='<div class="scroll-spy show">';
  pages.forEach(function(p){
    var anchor='fp-'+p.filename.replace(/[^a-z0-9]/g,'-');
    spy+='<div class="sp-item" data-target="'+anchor+'" onclick="document.getElementById(\''+anchor+'\').scrollIntoView({behavior:\'smooth\'})">'+esc(p.title)+'</div>';
  });
  spy+='</div>';
  document.getElementById('content').innerHTML=h+spy;
  // wikilink 핸들러
  document.querySelectorAll('.folder-view .md a').forEach(function(a){var h=a.getAttribute('href');if(h&&h.endsWith('.md')&&h.indexOf('://')<0){a.onclick=function(e){e.preventDefault();showPage(h);};a.style.cursor='pointer';}});
  // 스크롤 스파이 트래킹
  setupScrollSpy();
  renderSidebar();
}

function setupScrollSpy(){
  var content=document.getElementById('content');
  var items=content.querySelectorAll('.folder-page-item');
  var spItems=content.querySelectorAll('.scroll-spy .sp-item');
  if(!items.length||!spItems.length)return;
  function update(){
    var scrollTop=content.scrollTop;
    var activeIdx=0;
    items.forEach(function(it,idx){
      if(it.offsetTop-scrollTop<120)activeIdx=idx;
    });
    spItems.forEach(function(sp,idx){sp.classList.toggle('on',idx===activeIdx);});
  }
  content.addEventListener('scroll',update);update();
}

function showPage(fn){
  curFolder=null;
  cur=fn;setView('page');
  const p=D.pages.find(x=>x.filename===fn);if(!p){document.getElementById('content').innerHTML=`<div style="padding:40px;text-align:center;color:var(--muted)">Page not found: ${esc(fn)}</div>`;return;}
  document.getElementById('bc').innerHTML=`<b>${esc(p.title)}</b> · ${p.type} · ${p.updated||p.created}`;
  let body=p.content.replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g,'[$2]($1.md)').replace(/\[\[([^\]]+)\]\]/g,'[$1]($1.md)');
  // citation [^src-*] → 렌더 후 처리할 마커로 변환
  var citeMap={},citeN=0;
  body=body.replace(/\[\^(src-[a-z0-9-]+)\](?!:)/g,function(m,slug){
    if(!citeMap[slug])citeMap[slug]=++citeN;
    return '%%CITE:'+slug+'%%';
  });
  // citation 정의 줄 제거 (하단 footnote 줄)
  body=body.replace(/^\[\^src-[a-z0-9-]+\]:.*$/gm,'');
  var html=marked.parse(body);
  // 마커 → 배지 HTML
  html=html.replace(/%%CITE:([a-z0-9-]+)%%/g,function(m,slug){
    var n=citeMap[slug]||'?';
    var srcPage='source-'+slug.replace('src-','');
    var srcData=D.pages.find(function(pp){return pp.filename===srcPage+'.md';});
    var tipText=srcData?srcData.title:srcPage;
    return '<span class="cite-badge" onclick="showPage(\''+srcPage+'.md\')">'+n+'<span class="cite-tip">'+esc(tipText)+'</span></span>';
  });
  var c=TC[p.type]||'var(--muted)';
  var tags=p.tags.map(function(t){return '<span class="tag">'+esc(t)+'</span>';}).join('');
  var isSys=['index.md','log.md','overview.md'].indexOf(fn)>=0;
  var actions='<div class="page-actions">';
  actions+='<button onclick="editPage(\''+fn+'\')">'+t('btn_edit')+'</button>';
  actions+='<button onclick="doSlideExport(\''+fn+'\')">Slides</button>';
  actions+=(isSys?'':'<button class="danger" onclick="showDeleteModal(\''+fn+'\',\''+esc(p.title).replace(/'/g,"\\'")+'\')">'+t('btn_delete')+'</button>');
  actions+='</div>';
  document.getElementById('content').innerHTML='<div class="page"><div class="pmeta"><span class="tbadge" style="background:'+c+'22;color:'+c+'">'+p.type+'</span>'+tags+actions+'</div><div class="md">'+html+'</div></div>';
  document.querySelectorAll('.md a').forEach(function(a){var h=a.getAttribute('href');if(h&&h.endsWith('.md')&&h.indexOf('://')<0){a.onclick=function(e){e.preventDefault();showPage(h);};a.style.cursor='pointer';}});
  renderSidebar();
}

async function doIngest(){
  var ttl=document.getElementById('ingestTitle').value.trim(),ct=document.getElementById('ingestContent').value.trim(),f=document.getElementById('ingestFolder').value;
  if(!ttl||!ct){alert(t('err_title_required'));return;}
  var btn=document.getElementById('ingestBtn'),res=document.getElementById('ingestResult');
  btn.disabled=true;btn.textContent=t('ingest_processing');res.className='result-box info';

  // elapsed timer
  var t0=Date.now();
  function fmt(s){var m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;}
  function update(){
    var s=(Date.now()-t0)/1000;
    var msg=t('ingest_processing')+' '+fmt(s)+(LANG==='ko'?'  · 큰 소스는 5~10분 걸릴 수 있어요':'  · large sources can take 5-10 min');
    res.textContent=msg;
  }
  update();
  var timer=setInterval(update,1000);

  try{
    var r=await fetch('/api/ingest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:ttl,content:ct,folder:f})});
    var d=await r.json();
    clearInterval(timer);
    if(d.ok){
      await Promise.all([loadWiki(),loadFolders()]);renderStats();renderSidebar();
      showIngestResult(d);
    }else{
      var errText=d.error||'Unknown error';
      var html='<div style="white-space:pre-wrap">'+esc(errText)+'</div>';
      // timeout 또는 연결 문제일 때 진단 버튼 추가
      if(errText.toLowerCase().indexOf('timeout')>=0||errText.toLowerCase().indexOf('not found')>=0){
        html+='<div style="margin-top:12px"><button class="btn btn-outline" onclick="runClaudeDiagnose()">'+(LANG==='ko'?'Claude CLI 진단 실행':'Run Claude CLI diagnostic')+'</button></div>';
      }
      if(d.claude_output)html+='<div style="margin-top:8px;font-size:11px;opacity:.7">'+esc(d.claude_output)+'</div>';
      res.className='result-box err';
      res.innerHTML=html;
      btn.disabled=false;btn.textContent=t('ingest_btn');
    }
  }catch(e){
    clearInterval(timer);
    res.className='result-box err';res.textContent=t('err_network')+e.message;
    btn.disabled=false;btn.textContent=t('ingest_btn');
  }
}

async function runClaudeDiagnose(){
  toast(LANG==='ko'?'Claude CLI 점검 중...':'Diagnosing Claude CLI...','info');
  try{
    var r=await fetch('/api/claude/diagnose');var d=await r.json();
    var lines=[];
    lines.push('CLI installed: '+(d.cli_installed?'✓':'✗'));
    if(d.version)lines.push('Version: '+d.version);
    lines.push('Model: '+d.model);
    if(d.quick_test_seconds!==null){
      lines.push('Quick test: '+(d.quick_test_ok?'✓':'✗')+' ('+d.quick_test_seconds+'s)');
      if(d.quick_test_output)lines.push('  → '+d.quick_test_output);
    }
    if(d.error)lines.push('Error: '+d.error);
    if(d.advice&&d.advice.length){lines.push('');lines.push((LANG==='ko'?'권장사항:':'Advice:'));d.advice.forEach(function(a){lines.push('  • '+a);});}
    var res=document.getElementById('ingestResult');
    if(res){res.className='result-box info';res.innerHTML='<div style="white-space:pre-wrap;font-family:var(--mono)">'+esc(lines.join('\n'))+'</div>';}
  }catch(e){toast((LANG==='ko'?'진단 실패: ':'Diagnose failed: ')+e.message,'err');}
}

function selectIrFile(idx){
  var files=window._irFiles;
  if(!files||!files[idx])return;
  // highlight
  var items=document.querySelectorAll('.ir-file');
  items.forEach(function(el,i){el.classList.toggle('on',i===idx);});
  var f=files[idx];
  var detail=document.getElementById('irDetail');
  if(f.type==='created'){
    detail.innerHTML='<div class="ir-preview"><div class="md">'+marked.parse(f.preview||'(empty)')+'</div></div>';
  }else{
    detail.innerHTML='<div class="ir-diff">'+formatDiff(f.diff||'')+'</div>';
  }
}

function formatDiff(raw){
  if(!raw)return '<span style="color:var(--muted)">(no diff)</span>';
  var lines=raw.split('\n');
  var out=[];
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    var el=esc(l);
    if(l.startsWith('@@'))out.push('<span class="d-hdr">'+el+'</span>');
    else if(l.startsWith('+')&&!l.startsWith('+++'))out.push('<span class="d-add">'+el+'</span>');
    else if(l.startsWith('-')&&!l.startsWith('---'))out.push('<span class="d-del">'+el+'</span>');
    else out.push(el);
  }
  return out.join('\n');
}

async function doWrite(){

// ─── Graph ───
function showGraph(){
  setView('graph');cur=null;document.getElementById('bc').innerHTML=t('graph_title');
  const area=document.getElementById('content');area.innerHTML='<div class="graph-wrap"><canvas id="cv"></canvas></div>';
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),box=cv.parentElement;
  const dpr=window.devicePixelRatio||1;cv.width=box.clientWidth*dpr;cv.height=box.clientHeight*dpr;cv.style.width=box.clientWidth+'px';cv.style.height=box.clientHeight+'px';ctx.scale(dpr,dpr);
  const W=box.clientWidth,H=box.clientHeight;
  if(!D||!D.graph.nodes.length){ctx.fillStyle='#8b949e';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('No pages yet',W/2,H/2);return;}
  const ns=D.graph.nodes.map(n=>({...n,x:W/2+(Math.random()-.5)*300,y:H/2+(Math.random()-.5)*300,vx:0,vy:0,r:n.type==='overview'?18:n.type==='missing'?7:13}));
  const nm={};ns.forEach(n=>nm[n.id]=n);
  const es=D.graph.edges.filter(e=>nm[e.from]&&nm[e.to]).map(e=>({s:nm[e.from],t:nm[e.to]}));
  let hov=null,drag=null,moved=false;
  function tick(){const cx=W/2,cy=H/2;for(const n of ns){n.vx+=(cx-n.x)*.001;n.vy+=(cy-n.y)*.001;}
    for(let i=0;i<ns.length;i++)for(let j=i+1;j<ns.length;j++){const a=ns[i],b=ns[j];let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1,f=1200/(d*d);a.vx-=dx/d*f;a.vy-=dy/d*f;b.vx+=dx/d*f;b.vy+=dy/d*f;}
    for(const e of es){let dx=e.t.x-e.s.x,dy=e.t.y-e.s.y,d=Math.sqrt(dx*dx+dy*dy)||1,f=(d-140)*.004;e.s.vx+=dx/d*f;e.s.vy+=dy/d*f;e.t.vx-=dx/d*f;e.t.vy-=dy/d*f;}
    for(const n of ns){if(n===drag)continue;n.vx*=.82;n.vy*=.82;n.x+=n.vx;n.y+=n.vy;n.x=Math.max(n.r+10,Math.min(W-n.r-10,n.x));n.y=Math.max(n.r+10,Math.min(H-n.r-10,n.y));}
    ctx.clearRect(0,0,W,H);
    for(const e of es){const hi=hov&&(e.s.id===hov.id||e.t.id===hov.id);ctx.strokeStyle=hi?'#58a6ff66':'#30363d';ctx.lineWidth=hi?2:1;ctx.beginPath();ctx.moveTo(e.s.x,e.s.y);ctx.lineTo(e.t.x,e.t.y);ctx.stroke();}
    for(const n of ns){const c=TC[n.type]||'#8b949e',hi=hov&&hov.id===n.id,act=cur===n.id;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      if(n.type==='missing'){ctx.fillStyle='#0d1117';ctx.fill();ctx.strokeStyle=c;ctx.lineWidth=2;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);}
      else{ctx.fillStyle=hi||act?c:c+'77';ctx.fill();if(act){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();}}
      ctx.fillStyle=hi?'#e6edf3':'#8b949e';ctx.font=`${hi?13:11}px -apple-system,sans-serif`;ctx.textAlign='center';ctx.fillText(n.label,n.x,n.y+n.r+14);}
    requestAnimationFrame(tick);}
  function hit(mx,my){for(const n of ns){const dx=mx-n.x,dy=my-n.y;if(dx*dx+dy*dy<(n.r+5)**2)return n;}return null;}
  cv.onmousemove=e=>{const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;if(drag){drag.x=mx;drag.y=my;drag.vx=0;drag.vy=0;moved=true;return;}hov=hit(mx,my);cv.style.cursor=hov?'pointer':'default';};
  cv.onmousedown=e=>{const r=cv.getBoundingClientRect();drag=hit(e.clientX-r.left,e.clientY-r.top);moved=false;};cv.onmouseup=()=>{drag=null;};
  cv.onclick=e=>{if(moved)return;const r=cv.getBoundingClientRect(),n=hit(e.clientX-r.left,e.clientY-r.top);if(n&&D.pages.find(p=>p.filename===n.id))showPage(n.id);};
  tick();
}

  document.getElementById('content').innerHTML='<div class="panel"><h2>CLAUDE.md</h2><p class="desc">'+t('guide_loading')+'</p></div>';
  try{
    var r=await fetch('/api/schema');var d=await r.json();
    var h='<div class="panel">';
    h+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">';
    h+='<h2 style="margin:0">CLAUDE.md</h2>';
    h+='<button class="btn btn-outline" id="schemaToggle" onclick="toggleSchemaEdit()">'+t('btn_edit')+'</button>';
    h+='</div>';
    h+='<p class="desc">'+t('schema_desc')+'</p>';
    h+='<div id="schemaView"><div class="md">'+marked.parse(d.content||'(empty)')+'</div></div>';
    h+='<div id="schemaEdit" style="display:none">';
    h+='<textarea class="edit-area" id="schemaArea" style="min-height:500px">'+esc(d.content||'')+'</textarea>';
    h+='<div class="edit-actions">';
    h+='<button class="btn btn-green" onclick="saveSchema()">'+t('btn_save')+'</button>';
    h+='<button class="btn btn-outline" onclick="toggleSchemaEdit()">'+t('btn_cancel')+'</button>';
    h+='</div></div></div>';
    document.getElementById('content').innerHTML=h;
    window._schemaOriginal=d.content||'';
  }catch(e){
    document.getElementById('content').innerHTML='<div class="panel"><p class="desc" style="color:var(--red)">'+t('err_network')+e.message+'</p></div>';
  }
}
function toggleSchemaEdit(){
  var v=document.getElementById('schemaView');
  var e=document.getElementById('schemaEdit');
  var btn=document.getElementById('schemaToggle');
  if(e.style.display==='none'){
    e.style.display='block';v.style.display='none';btn.textContent='Preview';
    editing=true;
  }else{
    e.style.display='none';v.style.display='block';btn.textContent='Edit';
    // re-render preview from textarea
    var txt=document.getElementById('schemaArea').value;
    document.getElementById('schemaView').innerHTML='<div class="md">'+marked.parse(txt||'(empty)')+'</div>';
    editing=false;
  }
}
async function saveSchema(){
  var content=document.getElementById('schemaArea').value;
  try{
    const r=await fetch('/api/schema',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:content})});
    const d=await r.json();
    if(d.ok){
      document.getElementById('schemaView').innerHTML='<div class="md">'+marked.parse(content||'(empty)')+'</div>';
      document.getElementById('schemaEdit').style.display='none';
      document.getElementById('schemaView').style.display='block';
      document.getElementById('schemaToggle').textContent='Edit';
      editing=false;
      window._schemaOriginal=content;
    }
  }catch(e){alert('Error: '+e.message);}
}

// 스트리밍 상태
var streamingState=null;

function showGuide(){
  setView('guide');cur=null;curFolder=null;
  document.getElementById('bc').innerHTML='<b>'+t('guide_title')+'</b>';
  var md=buildGuide(LANG);
  var content=document.getElementById('content');
  var seenKey='guide_seen_'+LANG;
  var alreadySeen=localStorage.getItem(seenKey)==='1';

  content.innerHTML='<div class="page">'+buildGuideControls(alreadySeen)+'<div class="md" id="guideBody"></div></div>';

  if(alreadySeen){
    document.getElementById('guideBody').innerHTML=marked.parse(md);
    bindGuideLinks();
  }else{
    startStreamGuide(md);
  }
}

function buildGuideControls(alreadySeen){
  var label=alreadySeen?(LANG==='ko'?'가이드 (완료)':'Guide (already seen)'):(LANG==='ko'?'스트리밍 중...':'Streaming...');
  var btnLabel=alreadySeen?(LANG==='ko'?'다시 스트리밍':'Restart stream'):(LANG==='ko'?'건너뛰기':'Skip');
  var btnHandler=alreadySeen?'restartGuideStream()':'skipGuideStream()';
  return '<div class="guide-controls">'+
    '<span class="gc-label" id="gcLabel">'+label+'</span>'+
    '<span class="gc-progress"><span class="gc-progress-fill" id="gcProgress" style="width:'+(alreadySeen?100:0)+'%"></span></span>'+
    '<button onclick="'+btnHandler+'">'+btnLabel+'</button>'+
    '</div>';
}

function startStreamGuide(md){
  var el=document.getElementById('guideBody');if(!el)return;
  var progress=document.getElementById('gcProgress');
  var i=0, chunk=4, delay=12, total=md.length;
  streamingState={active:true, md:md, handle:null};

  function step(){
    if(!streamingState||!streamingState.active)return;
    i=Math.min(total,i+chunk);
    var curText=md.substring(0,i);
    el.innerHTML=marked.parse(curText)+'<span class="stream-cursor"></span>';
    if(progress)progress.style.width=(i/total*100).toFixed(1)+'%';
    if(i<total){
      streamingState.handle=setTimeout(step,delay);
    }else{
      finishStream();
    }
  }
  step();
}

function finishStream(){
  if(!streamingState)return;
  var el=document.getElementById('guideBody');
  if(el)el.innerHTML=marked.parse(streamingState.md);
  var label=document.getElementById('gcLabel');
  if(label)label.textContent=LANG==='ko'?'가이드 (완료)':'Guide (done)';
  var progress=document.getElementById('gcProgress');
  if(progress)progress.style.width='100%';
  var ctrl=document.querySelector('.guide-controls');
  if(ctrl){
    var btn=ctrl.querySelector('button');
    if(btn){
      btn.textContent=LANG==='ko'?'다시 스트리밍':'Restart stream';
      btn.setAttribute('onclick','restartGuideStream()');
    }
  }
  localStorage.setItem('guide_seen_'+LANG,'1');
  streamingState=null;
  bindGuideLinks();
}

function skipGuideStream(){
  if(streamingState&&streamingState.handle)clearTimeout(streamingState.handle);
  if(streamingState)finishStream();
}

function restartGuideStream(){
  var md=buildGuide(LANG);
  var content=document.getElementById('content');
  content.innerHTML='<div class="page">'+buildGuideControls(false)+'<div class="md" id="guideBody"></div></div>';
  startStreamGuide(md);
}

function bindGuideLinks(){
  document.querySelectorAll('#guideBody a').forEach(function(a){
    var h=a.getAttribute('href');
    if(h&&h.endsWith('.md')&&h.indexOf('://')<0){
      a.onclick=function(e){e.preventDefault();showPage(h);};
      a.style.cursor='pointer';
    }
  });
}

function updateFolderSelects(){
  const opts='<option value="">wiki/ (root)</option>'+(folders?folders.children.map(c=>`<option value="${c.name}">${c.name}/</option>`).join(''):'');

async function doCreateFolder(){
  var n=document.getElementById('newFolderName').value.trim(),p=document.getElementById('newFolderParent').value;

  await fetch('/api/folder',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,parent:p})});
  await loadFolders();renderSidebar();closeModals();document.getElementById('newFolderName').value='';
}
async function doCreatePage(){
  var ttl=document.getElementById('newPageTitle').value.trim(),tp=document.getElementById('newPageType').value,f=document.getElementById('newPageFolder').value;

  var r=await fetch('/api/page',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:ttl,type:tp,folder:f})});
  var d=await r.json();
  await Promise.all([loadWiki(),loadFolders()]);renderStats();renderSidebar();closeModals();document.getElementById('newPageTitle').value='';
  if(d.filename)showPage(d.filename);
}

  var tb=document.getElementById('toolbar');if(!tb)return;
  var h='';
  CATEGORIES.forEach(function(cat){
    var hasActive=cat.items.some(function(it){return it.v===view;});
    h+='<div class="cat'+(hasActive?' has-active':'')+'" data-cat="'+cat.id+'">';
    h+='<button class="cat-btn" onclick="toggleCat(\''+cat.id+'\')" aria-haspopup="true">';
    h+='<span class="cat-icon">'+cat.icon+'</span>';
    h+='<span>'+t(cat.i18n)+'</span>';
    h+='<span class="cat-caret">▾</span>';
    h+='</button>';
    h+='<div class="cat-menu" role="menu">';
    cat.items.forEach(function(it){
      var label=it.i18n?t(it.i18n):(it.label||it.v);
      var active=it.v===view?' active':'';
      var handler=it.action==='folder'?'showCreateFolder()':it.action==='page'?'showCreatePage()':'navTo(\''+it.v+'\')';
      h+='<button class="cat-item'+active+'" onclick="closeCats();'+handler+'">';
      h+='<span class="ci-icon">'+it.icon+'</span>';
      h+='<span class="ci-label">'+esc(label)+'</span>';
      if(it.sub)h+='<span class="ci-sub">'+it.sub+'</span>';
      h+='</button>';
    });
    h+='</div></div>';
  });
  h+='<span class="bc" id="bc"></span>';
  tb.innerHTML=h;
}

function toggleCat(id){
  var els=document.querySelectorAll('.cat');
  els.forEach(function(el){
    if(el.dataset.cat===id)el.classList.toggle('open');
    else el.classList.remove('open');
  });
}
function closeCats(){
  document.querySelectorAll('.cat').forEach(function(el){el.classList.remove('open');});
}
// 외부 클릭 시 드롭다운 닫기
document.addEventListener('click',function(e){
  if(!e.target.closest('.cat'))closeCats();
});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')closeCats();
});

function navTo(v){
  if(v==='graph')showGraph();
  else if(v==='ingest')showIngest();
  else if(v==='query')showQuery();
  else if(v==='lint')showLint();
  else if(v==='reflect')showReflect();
  else if(v==='write')showWrite();
  else if(v==='compare')showCompare();
  else if(v==='review')showReview();
  else if(v==='search')showSearch();
  else if(v==='history')showHistory();
  else if(v==='provenance')showProvenance();
  else if(v==='schema')showSchema();
  else if(v==='guide')showGuide();
  renderToolbar();
}

// ─── Events ───
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{tab=b.dataset.t;document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('on',x===b));renderSidebar();});
document.getElementById('q').oninput=e=>{sq=e.target.value;if(tab!=='pages'){tab='pages';document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('on',x.dataset.t==='pages'));}renderSidebar();};
document.querySelectorAll('.modal-bg').forEach(m=>m.onclick=e=>{if(e.target===m)closeModals();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModals();});
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// 안전한 fetch → JSON. 빈 응답/HTML 응답도 처리.
async function fetchJson(url,options){
  var r=await fetch(url,options);
  var text=await r.text();
  if(!text||!text.trim()){
    return {ok:false,error:'Empty response from server (status '+r.status+')',_httpStatus:r.status};
  }
  try{
    return JSON.parse(text);
  }catch(e){
    return {ok:false,error:'Invalid JSON from server (status '+r.status+'): '+text.substring(0,200),_httpStatus:r.status,_raw:text};
  }
}
init();
</script>
